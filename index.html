<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏢 창업 프로젝트</title>
<style>
  :root{
    --org:#f57c2b; --org-d:#e05f0e; --grn:#22a06b; --grn-d:#178254;
    --pink:#ff7fae; --ink:#2b2b2b; --line:#e6e6e6; --bg:#f5f6f8; --card:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
  h1,h2,h3{margin:0 0 8px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:14px;padding:10px 14px}
  input,textarea,select{font-family:inherit;font-size:14px;width:100%;padding:9px 10px;border:1.5px solid var(--line);border-radius:9px;background:#fff}
  textarea{resize:vertical;min-height:64px}
  .btn-org{background:var(--org);color:#fff}
  .btn-org:hover{background:var(--org-d)}
  .btn-grn{background:var(--grn);color:#fff}
  .btn-grn:hover{background:var(--grn-d)}
  .btn-pink{background:var(--pink);color:#fff}
  .btn-gray{background:#e9edf1;color:#444}
  .btn-red{background:#e8524a;color:#fff}
  .btn-sm{padding:6px 10px;font-size:13px;border-radius:8px}
  .wrap{max-width:920px;margin:0 auto;padding:14px}
  .topbar{background:linear-gradient(90deg,var(--org),#ffa15c);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .topbar b{font-size:18px}
  .pill{background:rgba(255,255,255,.25);padding:4px 10px;border-radius:20px;font-size:13px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card h2{font-size:17px;display:flex;align-items:center;gap:7px}
  .muted{color:#8a8f98;font-size:13px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .field{margin-bottom:10px}
  .field label{display:block;font-weight:700;font-size:13px;margin-bottom:4px;color:#555}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .b-wait{background:#fff3e0;color:#c46a12}
  .b-ok{background:#e6f6ec;color:#178254}
  .b-no{background:#fdecea;color:#c0392b}
  .b-info{background:#e8f0fe;color:#2b5fd0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .applicant{border:1.5px solid var(--line);border-radius:12px;padding:12px;background:#fafbfc}
  .applicant.picked{border-color:var(--grn);background:#f1fbf5}
  .applicant.reserved{border-color:#f0b429;background:#fffaf0}
  /* 지원자 카드(예쁜 버전) */
  .appl{border:1.5px solid #e3e7ee;border-radius:16px;background:#fff;overflow:hidden;box-shadow:0 2px 8px rgba(60,80,120,.06)}
  .appl.picked{border-color:var(--grn)}
  .appl.reserved{border-color:#f0b429}
  .appl-top{display:flex;align-items:center;gap:10px;padding:11px 14px;background:linear-gradient(135deg,#eef2fb,#e3e9f7)}
  .appl.picked .appl-top{background:linear-gradient(135deg,#e8f8ef,#d3efdf)}
  .appl.reserved .appl-top{background:linear-gradient(135deg,#fff6e5,#ffe9c4)}
  .appl-ava{flex:0 0 auto;width:44px;height:44px;border-radius:50%;background:#fff;border:1.5px solid #cfd8ea;display:flex;align-items:center;justify-content:center;font-size:22px}
  .appl-id{flex:1 1 auto;min-width:0}
  .appl-no{font-size:17px;font-weight:900;color:#3a4a6b;word-break:break-all}
  .appl-pay{flex:0 0 auto;font-size:12px;font-weight:800;color:#c9520a;background:#fff;border:1px solid #ffd9bf;border-radius:20px;padding:3px 10px;white-space:nowrap}
  .appl-body{padding:8px 14px 12px}
  .appl-row{padding:6px 0;border-bottom:1px solid #f2f4f7;font-size:13.5px;line-height:1.5}
  .appl-row:last-child{border-bottom:0}
  .appl-row .l{font-size:11px;font-weight:800;color:#9aa0a6;display:block;margin-bottom:1px}
  .anon-tag{font-weight:800;color:var(--org)}
  #loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  #loginView.hidden{display:none}
  .login-box{width:100%;max-width:380px;margin:0 auto;background:#fff;border-radius:18px;padding:28px;box-shadow:0 8px 30px rgba(0,0,0,.1);text-align:center}
  .login-box h1{font-size:26px}
  .tabline{display:flex;gap:6px;margin:16px 0}
  .tabline button{flex:1;background:#eef1f4;color:#555}
  .tabline button.on{background:var(--org);color:#fff}
  .hidden{display:none!important}
  .step-dots{display:flex;gap:6px;flex-wrap:wrap}
  .step-dots .d{padding:6px 11px;border-radius:20px;background:#eef1f4;color:#888;font-size:12.5px;font-weight:700}
  .step-dots .d.on{background:var(--grn);color:#fff}
  .kv{font-size:13.5px;line-height:1.7}
  .kv b{color:#555}
  .divider{height:1px;background:var(--line);margin:12px 0}
  .sumtbl{border-collapse:collapse;width:100%;font-size:13px;min-width:760px}
  .sumtbl th,.sumtbl td{border:1px solid var(--line);padding:7px 9px;text-align:center;vertical-align:middle;white-space:nowrap}
  .sumtbl th{background:#f6f8fb;font-weight:800;color:#5a5f66}
  .sumtbl td:first-child{text-align:left}
  .sumtbl td:first-child .muted{display:block}
  .sumtbl tr.sumtot td{background:#fff7ee;font-weight:900;color:#c9520a}
  .sumtbl .sm-name{width:100%;min-width:120px;box-sizing:border-box;padding:5px 6px;font-size:13px;font-weight:800}
  .sumtbl td:first-child .muted{margin-top:2px;font-size:12px}
  .sumtbl .sm-in{width:100%;min-width:96px;box-sizing:border-box;padding:5px 6px;font-size:13px}
  .sumtbl .sm-num{width:62px;box-sizing:border-box;padding:5px 4px;font-size:13px;text-align:right}
  .sumtbl .u{font-size:11px;color:#9aa0a6;margin-left:2px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:11px 18px;border-radius:24px;font-size:14px;z-index:9999;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .empty{text-align:center;color:#9aa0a8;padding:22px;font-size:14px}
  .pc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:10000;padding:20px}
  .pc-overlay.show{display:flex}
  .pc-box{background:#fff;border-radius:22px;max-width:380px;width:100%;padding:26px 24px;text-align:center;box-shadow:0 16px 44px rgba(0,0,0,.28);animation:pcPop .18s ease}
  @keyframes pcPop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .pc-icon{font-size:46px;line-height:1;margin-bottom:8px}
  .pc-box h3{font-size:20px;margin:0 0 10px}
  .pc-msg{color:#555;font-size:14.5px;line-height:1.65;margin-bottom:20px}
  .pc-btns{display:flex;gap:10px}
  .pc-btns button{flex:1;padding:12px}
  .role-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:640px){.role-board{grid-template-columns:repeat(2,1fr)}}
  .role-col{background:#f6f7f9;border:2px solid var(--line);border-radius:12px;padding:8px;min-height:120px;transition:.15s}
  .role-col.drag-over{border-color:var(--org);background:#fff5ec}
  .role-col-h{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:8px;font-size:13px}
  .role-col-body{display:flex;flex-wrap:wrap;gap:6px;min-height:52px}
  .role-chip{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 11px;font-size:13px;font-weight:700;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.12s}
  .role-chip:hover{border-color:var(--org);box-shadow:0 2px 6px rgba(0,0,0,.08)}
  .role-chip:active{cursor:grabbing}
  .role-chip.dragging{opacity:.4}
  .chip-open{cursor:pointer;color:var(--org);font-weight:800;padding:0 3px;font-size:15px}
  .role-empty{width:100%;color:#b8bdc4;font-size:12px;text-align:center;padding:12px 4px;border:1px dashed var(--line);border-radius:8px}
  .nograb, .nograb *{user-select:none;-webkit-user-select:none;-moz-user-select:none;-webkit-touch-callout:none}
  .nograb img{pointer-events:none;-webkit-user-drag:none;user-drag:none}
  .role-board3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start}
  @media(max-width:640px){.role-board3{grid-template-columns:1fr}}
  .role-board3 .role-col{min-width:0}
  .rb-top{display:flex;gap:12px;align-items:start;flex-wrap:wrap}
  .rb-top>.role-col{flex:0 0 150px}
  .rb-top>.sb-wrap{flex:1 1 260px;min-width:0}
  @media(max-width:640px){.rb-top>.role-col,.rb-top>.sb-wrap{flex:1 1 100%}}
  .sb-table{border-collapse:separate;border-spacing:0;width:100%;margin-top:4px}
  .sb-table th{font-size:12px;color:#888;text-align:left;padding:4px 8px;border-bottom:1px solid var(--line)}
  .sb-table td{vertical-align:middle;padding:8px;border-bottom:1px solid #f1f2f4}
  .sb-table td.sb-boss{white-space:nowrap;width:1%}
  .sb-emps{min-height:38px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;border:1.5px dashed transparent;border-radius:10px;padding:4px 6px;background:#fafbfc}
  .sb-emps.drag-over{border-color:var(--org);background:#fff5ec}
  /* 채점표 가로 스크롤 — 예쁜 스크롤바 */
  .hscroll{overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:#f7943b #ffe7d6}
  .hscroll::-webkit-scrollbar{height:10px}
  .hscroll::-webkit-scrollbar-track{background:#ffe7d6;border-radius:20px}
  .hscroll::-webkit-scrollbar-thumb{background:linear-gradient(90deg,#f7943b,#ff6f3c);border-radius:20px;border:2px solid #ffe7d6}
  .hscroll::-webkit-scrollbar-thumb:hover{background:linear-gradient(90deg,#ff7f1e,#ff5a24)}
  .score-table{border-collapse:collapse;font-size:13px}
  .score-table th,.score-table td{border:1px solid #dcdfe4;padding:6px 8px;text-align:center}
  .score-table th{background:#f7f8fa;white-space:nowrap;font-size:12.5px}
  .score-table th.corner{text-align:left;color:#777}
  .score-table td.it{font-weight:800;white-space:nowrap;text-align:left;background:#fafbfc}
  .score-table td.sumcell{font-weight:900;background:#fff7ee}
  .score-table td.sumcell.top{background:#fff0d6;color:#c46a12}
  .stars{display:inline-flex;touch-action:manipulation;cursor:pointer;user-select:none;-webkit-user-select:none;white-space:nowrap}
  .stars.locked{cursor:default;opacity:.9}
  .star{position:relative;display:inline-block;width:1.25em;font-size:22px;line-height:1;color:#d5d9df}
  .star .fill{position:absolute;left:0;top:0;overflow:hidden;color:#f5b301;width:0}
  .biz-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .list-item{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:9px;background:#fff}
  /* 숫자 + 단위 입력 */
  .num-wrap{display:flex;align-items:center;gap:7px}
  .num-wrap input{flex:1;min-width:0}
  .num-wrap .unit{font-weight:800;color:#7a7f86;white-space:nowrap}
  /* 채용공고 카드 */
  .job{border:1.5px solid #ffd9bf;border-radius:16px;padding:0;margin-bottom:14px;background:#fff;overflow:hidden;box-shadow:0 2px 8px rgba(245,124,43,.08)}
  .job-top{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(135deg,#fff4ec,#ffe7d6)}
  .job-logo{flex:0 0 auto;width:52px;height:52px;border-radius:14px;background:#fff;border:1.5px solid #ffd0ae;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 2px 5px rgba(245,124,43,.12)}
  .job-id{flex:1 1 auto;min-width:0}
  .job-name{font-size:19px;font-weight:900;color:#c9520a;line-height:1.2;word-break:break-all}
  .job-boss{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:13px;font-weight:800;color:#7a5a45;background:#fff;border:1px solid #ffd9bf;border-radius:20px;padding:2px 10px}
  .job-body{padding:12px 16px 14px}
  .job-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .job-cell{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .job-cell .l{font-size:11px;font-weight:800;color:#9aa0a6;letter-spacing:.02em}
  .job-cell .v{font-size:14px;font-weight:800;color:#3a3f45;margin-top:2px;word-break:break-all}
  .job-cell.wide{grid-column:1 / -1}
  .job-cell.biz .v{font-weight:700;white-space:pre-wrap;line-height:1.45}
  /* 교사: 회사(열) 순서 드래그 재정렬 — 태블릿 지원 위해 포인터 드래그 사용 */
  .ord-wrap{border:1px dashed #ffd9bf;border-radius:10px;padding:8px;margin-bottom:10px;background:#fffaf6}
  .ord-row{display:flex;align-items:center;gap:8px;padding:9px 10px;margin:5px 0;background:#fff;border:1px solid #ffe0c9;border-radius:8px;font-weight:800;touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab}
  .ord-row.ord-dragging{opacity:.9;box-shadow:0 4px 12px rgba(245,124,43,.28);cursor:grabbing}
  .ord-grip{color:#f5943b;font-size:18px;line-height:1}
  .job-pill{display:inline-block;font-size:12px;font-weight:800;color:#178254;background:#e7f6ef;border-radius:20px;padding:2px 9px;margin-right:5px}
  .job-pill.off{color:#9aa0a6;background:#f0f1f3}
</style>
</head>
<body>

<!-- ================= 로그인 ================= -->
<div id="loginView">
  <div class="login-box">
    <h1>🏢 창업 프로젝트</h1>
    <div class="tabline">
      <button id="tabStu" class="on" onclick="switchLogin('stu')">학생</button>
      <button id="tabTch" onclick="switchLogin('tch')">선생님</button>
    </div>
    <div id="stuLogin">
      <div class="field"><input id="stuCodeInput" placeholder="학생 코드 입력" onkeyup="if(event.key==='Enter')doStuLogin()"></div>
      <button class="btn-org" style="width:100%" onclick="doStuLogin()">입장하기 🚀</button>
    </div>
    <div id="tchLogin" class="hidden">
      <div class="field"><input id="tchPwInput" type="password" placeholder="교사 코드" onkeyup="if(event.key==='Enter')doTchLogin()"></div>
      <button class="btn-grn" style="width:100%" onclick="doTchLogin()">입장하기 🚀</button>
    </div>
    <p id="loginMsg" class="muted" style="color:#c0392b;min-height:18px"></p>
  </div>
</div>

<!-- ================= 앱 ================= -->
<div id="appView" class="hidden">
  <div class="topbar">
    <b>🏢 창업 프로젝트</b>
    <div class="row">
      <span class="pill" id="whoPill"></span>
      <span class="pill" id="phasePill"></span>
      <button class="pill" id="gearBtn" onclick="openSettings()" title="설정" style="display:none;cursor:pointer;border:none;font-size:18px">⚙️</button>
      <button class="btn-gray btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="wrap" id="mainArea"></div>
</div>

<div id="toast" class="toast"></div>

<!-- 교사 설정 -->
<div id="setOverlay" class="pc-overlay">
  <div class="pc-box">
    <div class="pc-icon">⚙️</div>
    <h3>설정</h3>
    <div class="pc-msg">자료를 백업(내보내기)하거나 백업 파일로 되돌리고, 전체 초기화할 수 있어요.</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-grn" onclick="pushUpdate()">🔄 업데이트 (학생 새로고침)</button>
      <button class="btn-grn" onclick="exportData()">📤 자료 내보내기 (백업)</button>
      <button class="btn-org" onclick="document.getElementById('importFile').click()">📥 자료 불러오기</button>
      <button class="btn-red" onclick="closeSettings();resetAll()">🧹 전체 초기화</button>
      <button class="btn-gray" onclick="closeSettings()">닫기</button>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(this)">
  </div>
</div>

<!-- 예쁜 확인창 -->
<div id="pcOverlay" class="pc-overlay">
  <div class="pc-box">
    <div class="pc-icon" id="pcIcon">⚠️</div>
    <h3 id="pcTitle"></h3>
    <div id="pcMsg" class="pc-msg"></div>
    <div class="pc-btns">
      <button class="btn-gray" id="pcCancel" onclick="pcClose()">취소</button>
      <button class="btn-org" onclick="pcConfirm()">확인</button>
    </div>
  </div>
</div>

<!-- Firebase compat 8.10.1 (기존 우리반 매니저와 동일 버전) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
/* ============================================================
   창업 프로젝트 — 독립 HTML 앱
   - 기존 우리반 매니저(class-manager-bad00) DB에 연결
   - 명단: ClassData/EventShop/stu (읽기 전용)
   - 신규 데이터: ClassData/Startup/ 하위에 격리
   - 월급 지급은 범위 밖(키오스크가 처리). 근로계약서까지.
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCzsI9FW3bga1V73lCR7pNgfPLdcqcbsgM",
  authDomain: "class-manager-bad00.firebaseapp.com",
  databaseURL: "https://class-manager-bad00-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "class-manager-bad00",
  storageBucket: "class-manager-bad00.firebasestorage.app",
  messagingSenderId: "436830301778",
  appId: "1:436830301778:web:d3da11a5ac0e6c252d798b"
};
firebase.initializeApp(firebaseConfig);
const ROOT = firebase.database().ref('ClassData');
const S    = ROOT.child('Startup');
const DBROOT = firebase.database().ref();                    // 루트(키오스크 kiosk_booths 노드용)
const KIOSK_BASE = 'https://csgo0404-ai.github.io/class-koisk/';   // 키오스크 부스 링크 베이스
const CLD_CLOUD = 'dtzknm7gz', CLD_PRESET = 'csgo0404';   // Cloudinary(동화책과 동일) — 서명 이미지 호스팅
const TS   = firebase.database.ServerValue.TIMESTAMP;

/* ---------- 전역 상태 ---------- */
let ME = null;                 // {cd, nm, no}  학생. 교사면 null
let IS_TEACHER = false;
let ROSTER = {};               // cd -> {nm, no}
let DB = {};                   // Startup 스냅샷 전체
const PHASE_LABEL = ['0일차 · 진로선택/사업계획','1일차 · 면접·채용/지원','2일차 · 발표·채용확정','3일차 · 부스운영'];
const MAXPHASE = PHASE_LABEL.length - 1;   // 2
function boothIdFor(ownerCd){ return 'sb_'+ownerCd; }
// 키오스크는 같은 폴더에 함께 올리는 전제 → 상대경로. (다른 곳 호스팅이면 KIOSK_BASE로 교체)
function _boothUrl(ownerCd){ return 'kiosk.html?booth='+encodeURIComponent(boothIdFor(ownerCd))+'&me='+encodeURIComponent((ME&&ME.cd)||''); }
function _ensureBoothThen(ownerCd, cb){
  const id = boothIdFor(ownerCd);
  const b = obj(obj(DB.businesses)[ownerCd]);
  const name = b.name || (nmeOf(ownerCd)+'의 가게');
  let done=false; const go=()=>{ if(!done){ done=true; cb(); } };
  try{ DBROOT.child('kiosk_booths/'+id).transaction(cur=> cur ? cur : { id, name, group:'', icon:'🏪', color:'#FFE0B2', ownerCd, open:true, createdAt:Date.now() }, go); }

/* 이벤트상점 쿠키 잔액 조정용 멀티패스 업데이트 조각을 만든다(쓰지는 않음).
   delta 양수=차감(잔액↓), 음수=지급(잔액↑). EventShop 잔액=…−shopUsed 구조라 shopUsed를 원자적 increment
   (동시 경합 유실 방지, 쿠키 직접증가 금지). 코드→키 매핑은 즉석 조회(교사 세션이 실행).
   반환 {updates(ROOT 기준 경로), missing:[계정없는 코드…]} — 호출부가 상태변경과 합쳐 한 번의 ROOT.update로 원자 커밋. */
/* 코드→EventShop키 매핑: stu 전체를 매번 읽으면 읽기 폭증 → 60초 캐시(키는 안정적).
   loadRoster가 이미 읽은 스냅샷으로 시드되므로 평소엔 추가 읽기 0. */
async function _shopKeyMap(force){
  const now = Date.now();
  if(!force && window._shopKeyCache && (now-(window._shopKeyCacheAt||0) < 60000)) return window._shopKeyCache;
  const snap = await ROOT.child('EventShop/stu').once('value');
  const map = {};
  snap.forEach(ch=>{ const s=ch.val(); if(s && s.cd!=null) map[String(s.cd).trim()]=ch.key; });
  window._shopKeyCache = map; window._shopKeyCacheAt = now;
  return map;
}
async function _cookieUpdates(deltaByCode){
  const clean = {};
  Object.keys(deltaByCode||{}).forEach(c=>{ const d=Math.round(deltaByCode[c]||0); if(d!==0) clean[String(c).trim()]=d; });
  const updates = {}; const missing = [];
  if(!Object.keys(clean).length) return { updates, missing };
  let keyByCode = await _shopKeyMap();
  // 캐시에 없는 코드가 있으면(신규 학생 등) 딱 한 번 강제 새로고침 → 정확성 유지, 트래픽 최소
  if(Object.keys(clean).some(c=> keyByCode[c]==null)) keyByCode = await _shopKeyMap(true);
  Object.keys(clean).forEach(code=>{
    const k = keyByCode[code];
    if(k==null){ missing.push(code); return; }
    updates['EventShop/stu/'+k+'/shopUsed']   = firebase.database.ServerValue.increment(clean[code]);
    updates['EventShop/stu/'+k+'/updatedAt']  = Date.now();
  });
  return { updates, missing };
}
/* 특정 코드의 상점 키를 '추가 읽기 없이' 해결(로그인 시 시드된 캐시 우선). 캐시에 없을 때만 1회 강제 조회.
   학생이 본인 지급(서명) 시 EventShop/stu 전체(무거움) 재조회를 피하기 위함. */
async function _resolveShopKey(cd){
  let k = (window._shopKeyCache||{})[cd];
  if(k==null){ const m = await _shopKeyMap(true); k = m[cd]; }
  return k;
}
/* 상점이용권(쿠키 1:1 대체) — inv에서 활성 '상점이용권' 슬롯 인덱스 목록 */
function _activeVoucherIdx(inv){
  const out=[];
  Object.keys(inv||{}).forEach(idx=>{ const it=inv[idx]; if(!it||it.st!=='active')return; if(String(it.n||'').replace(/\s/g,'').includes('상점이용권')) out.push(idx); });
  return out;
}
/* 사장 계정의 가용 쿠키 + 활성 상점이용권 조회(EventShop/stu/<key> 1건 읽기). 없으면 null */
async function _bossShopInfo(cd){
  const k = await _resolveShopKey(cd);
  if(k==null) return null;
  let s; try{ s = (await ROOT.child('EventShop/stu/'+k).once('value')).val()||{}; }catch(_){ return null; }
  const avail = Math.max(0, (s.cookie||0)-(s.usedCookie||0)-(s.shopUsed||0));
  const vIdx = _activeVoucherIdx(s.inv);
  return { key:k, avail, voucherIdx:vIdx, voucherCount:vIdx.length };
}

async function loadRoster(force){
  // 캐시 우선(12시간 TTL): EventShop/stu 는 inv(인벤토리)까지 포함돼 무거우므로 매 로드마다 읽지 않음(egress 대폭 절감).
  // 캐시에 없는 코드로 로그인 시도 시에만 force=true 로 네트워크 강제 조회(신규 학생 대응).
  let cache=null; try{ cache=JSON.parse(localStorage.getItem('startup_roster')||'null'); }catch(_){}
  const FRESH = 30*24*60*60*1000;   // 명단 캐시 최대한 길게(30일). 신규/변경은 로그인 미스 시 강제조회로 커버
  if(!force && cache && cache.map && cache.at && (Date.now()-cache.at < FRESH)){
    ROSTER = cache.map;
    if(cache.keys){ window._shopKeyCache = cache.keys; window._shopKeyCacheAt = cache.at; }   // 지급용 코드→키도 캐시 시드
    return;   // 네트워크 읽기 생략
  }
  try{
    const snap = await ROOT.child('EventShop/stu').once('value');
    const r = {}; const km = {};
    snap.forEach(ch=>{ const s=ch.val(); if(s&&s.cd!=null){ const cd=String(s.cd).trim(); if(cd){ r[cd]={ nm:s.nm||cd, no:s.no }; km[cd]=ch.key; } } });
    window._shopKeyCache = km; window._shopKeyCacheAt = Date.now();   // 코드→키 캐시 시드(지급 시 추가 읽기 방지)
    if(Object.keys(r).length){ ROSTER=r; try{ localStorage.setItem('startup_roster', JSON.stringify({at:Date.now(), map:r, keys:km})); }catch(_){}; return; }
    if(cache && cache.map) ROSTER=cache.map;               // 빈 스냅샷 방어
  }catch(e){
    if(cache && cache.map){ ROSTER=cache.map; }            // 오프라인/실패 시에만 캐시
    else throw e;
  }
}

/* 학생 세션: 남의 이력서·점수·offer를 받지 않고 필요한 노드만 구독 */
function subscribeStudent(){
  const cd = ME.cd; DB = {};
  const setSlice = (k, v)=>{ DB[k]=v; scheduleRender(); };
  const setIv = (k, v)=>{ DB.interview=DB.interview||{}; DB.interview[k]=v; scheduleRender(); };
  const setMine = (k, v)=>{ DB[k]=DB[k]||{}; DB[k][cd]=v; scheduleRender(); };
  S.child('meta').on('value', s=>{ const mv=s.val()||{}; setSlice('meta', mv); _maybeSubContracts(); _maybeForceReload(mv); });
  // egress 절감: 학생은 무거운 businesses 전체(desc·plan·budget·investment·서명URL) 대신
  //   ① 슬림 미러 bizPub(전 회사, 남이 필요한 필드만) + ② 내 회사만 풀 구독 → DB.businesses로 병합.
  //   (남 회사 읽기는 name·status·bonus·ins4·condition·ceo만 쓰므로 bizPub로 충분, 내 회사는 풀로 유지)
  let _bizPub = {}, _bizFull = null, _ownBiz = null, _fbRef = null;
  const _rebuildBiz = ()=>{
    const base = Object.keys(_bizPub).length ? _bizPub : (_bizFull || {});   // bizPub 있으면 슬림, 비면 폴백(businesses)
    const m = Object.assign({}, base);
    delete m[cd];                  // 내 회사는 슬림(bizPub)으로 채우지 않음 → 풀 도착 전 빈칸/덮어쓰기 방지
    if(_ownBiz) m[cd] = _ownBiz;   // 내 회사는 오직 풀(_ownBiz)로만
    DB.businesses = m; scheduleRender();
  };
  const _fbCb = s=>{ _bizFull = s.val()||{}; _rebuildBiz(); };
  const _syncFallback = ()=>{   // bizPub 비어있으면 businesses 전체로 임시 폴백, 채워지면 해제(egress 복귀)
    const empty = !Object.keys(_bizPub).length;
    if(empty && !_fbRef){ _fbRef = S.child('businesses'); _fbRef.on('value', _fbCb); }
    else if(!empty && _fbRef){ _fbRef.off('value', _fbCb); _fbRef = null; _bizFull = null; }
  };
  // bizPub 첫 스냅샷이 비었을 때만 폴백 부착(정상 케이스엔 full businesses 안 읽음 → 초기 egress 절감 유지)
  S.child('bizPub').on('value', s=>{ _bizPub = s.val()||{}; _syncFallback(); _rebuildBiz(); });   // 슬림·저용량
  S.child('businesses/'+cd).on('value', s=>{ _ownBiz = s.val()||null; _rebuildBiz(); });   // 내 회사만 풀
  S.child('jobPosts').on('value', s=>{ setSlice('jobPosts', s.val()||{}); _maybeAutoCloseRehire(); });
  S.child('interview/config').on('value', s=>setIv('config', s.val()||{}));
  // interview/questions는 학생 미구독 — 남의 질문 안 받고 내 질문만 로컬 보관(트래픽 절감)
  S.child('interview/scores/'+cd).on('value', s=>{ DB.interview=DB.interview||{}; DB.interview.scores=DB.interview.scores||{}; DB.interview.scores[cd]=s.val()||{}; scheduleRender(); });
  S.child('offers/'+cd).on('value', s=>setMine('offers', s.val()||{}));
  // acceptedLock은 전체 구독(작은 노드): 사장이 지원자의 타 회사 취업 여부를 확인. 본인 값은 DB.acceptedLock[cd]로 그대로 접근
  S.child('acceptedLock').on('value', s=>setSlice('acceptedLock', s.val()||{}));
  S.child('civilServants/'+cd).on('value', s=>setMine('civilServants', s.val()));
  S.child('applicantIndex/'+cd).on('value', s=>setMine('applicantIndex', s.val()||{}));
  // 사장(승인된 학생)만 의미 있음: 내 회사 지원자/선발/확정직원
  S.child('resumes/'+cd).on('value', s=>setMine('resumes', s.val()||{}));
  S.child('selections/'+cd).on('value', s=>setMine('selections', s.val()||{}));
  S.child('hires/'+cd).on('value', s=>{ setMine('hires', s.val()||{}); _maybeAutoCloseRehire(); });   // 수락(입사확정)한 직원 → 추가채용 자동마감 체크
  S.child('payroll/'+cd).on('value', s=>setMine('payroll', s.val()||{}));   // 사장: 내 회사 월급 정산 요청/결과
  // 근로계약(contracts)은 2일차부터만 쓰이므로 그때 lazy 구독 → 0·1일차 팬아웃 절감
  window._contractsSubbed = false;
  window._maybeSubContracts = function(){
    if(window._contractsSubbed || phase()<2) return;
    window._contractsSubbed = true;
    S.child('contracts').on('value', s=>setSlice('contracts', s.val()||{}));   // 사장코드_근로자코드 키, 전체(작음)
  };
  _maybeSubContracts();
  DBROOT.child('kiosk_booths').on('value', s=>{ window._kioskBooths=s.val()||{}; scheduleRender(); });   // 공무원 부스 링크용(작음)
}

/* 유휴 연결 관리: 10분 무동작 시 goOffline, 활동/복귀 시 goOnline (writes는 큐잉되어 유실 없음) */
let _idleTimer=null;
function _goActive(){
  if(window._dbOffline){ try{ firebase.database().goOnline(); }catch(_){}; window._dbOffline=false; }
  clearTimeout(_idleTimer);
  _idleTimer=setTimeout(()=>{ try{ firebase.database().goOffline(); window._dbOffline=true; }catch(_){} }, (IS_TEACHER?5:10)*60*1000);
}
function _initIdle(){
  ['click','keydown','pointerdown','touchstart'].forEach(ev=>document.addEventListener(ev, _goActive, {passive:true}));
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState!=='hidden') _goActive(); });
  _goActive();
}

let _pendingRender = false;
function isEditing(){
  const ae = document.activeElement;
  return ae && $('mainArea').contains(ae) && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName);
}
/* 렌더 합치기: 즉시 1회(응답성) + 버스트는 120ms 간격으로 코얼레스.
   교사 기기는 학생 30명의 모든 변경 델타를 받아 full 재렌더가 몰릴 수 있어 CPU/배터리 절감. 동작·정합성은 동일. */
let _renderCoalesceTimer=null, _renderMore=false;
function scheduleRender(){
  // 교사 첫 렌더는 부스 로드까지 한 번만 대기 → 부스 로드 후 추가 재렌더(깜빡임) 방지
  if(IS_TEACHER && !window._firstRenderDone && phase()>=2 && !window._kioskBoothsLoaded){ _pendingRender = true; return; }
  if(isEditing() || window._starDragging || window._ordDragging){ _pendingRender = true; return; }
  window._firstRenderDone = true;
  _pendingRender = false;
  if(_renderCoalesceTimer){ _renderMore = true; return; }   // 이미 방금 렌더함 → 뒤이은 버스트는 합침
  render();
  _renderCoalesceTimer = setTimeout(function _tick(){
    if(_renderMore && !(isEditing() || window._starDragging || window._ordDragging)){ _renderMore=false; render(); _renderCoalesceTimer=setTimeout(_tick,120); }
    else if(_renderMore){ /* 편집 중이면 보류 후 focusout에서 처리 */ _pendingRender=true; _renderMore=false; _renderCoalesceTimer=null; }
    else { _renderCoalesceTimer=null; }
  }, 120);
}

/* 현재 사용자의 사업(사장 트랙) */
function myBiz(){ return IS_TEACHER ? null : obj(DB.businesses)[ME.cd]; }

function render(){
  // 3일차 자동 이동 없음 → 사장·알바는 부스 링크 버튼(boothLinkCard)을 눌러 새 창으로 입장
  $('phasePill').textContent = PHASE_LABEL[phase()] || ('phase '+phase());
  const el = $('mainArea');
  // 가로 스크롤 위치 보존: 재렌더로 innerHTML을 갈아끼워도 채점표 등 스크롤 위치가 왼쪽으로 튀지 않게.
  const _hs = {};
  el.querySelectorAll('.hscroll[data-hskey]').forEach(d=>{ _hs[d.dataset.hskey]=d.scrollLeft; });
  if(IS_TEACHER) el.innerHTML = viewTeacher();
  else if(myBiz() && myBiz().status==='approved') el.innerHTML = viewBoss();  // 승인된 사장만 사장 화면
  else el.innerHTML = viewStudent();  // 미승인·미제출·공무원·일반은 학생 화면(두 트랙 모두 작성 가능)
  el.querySelectorAll('.hscroll[data-hskey]').forEach(d=>{ const v=_hs[d.dataset.hskey]; if(v!=null) d.scrollLeft=v; });
}

/* 교사 조회: 이력서를 한 곳도 제출하지 않은 학생 집합 / 어느 회사에도 선정(합격·후보)되지 못한 학생 집합 */
function _submittedResumeSet(){
  const s = new Set();
  entries(DB.resumes).forEach(([bc, apps])=> Object.keys(obj(apps)).forEach(acd=> s.add(acd)));
  return s;
}
function _selectedSet(){
  const s = new Set();
  entries(DB.selections).forEach(([bc, sel])=>{ sel=obj(sel); Object.keys(obj(sel.hired)).forEach(a=>s.add(a)); Object.keys(obj(sel.reserve)).forEach(a=>s.add(a)); });
  return s;
}
/* 사장·공무원을 제외한 학생 중 pred(cd)를 만족하는 학생 목록(번호순) */
function _stuListExcludingRoles(pred){
  return Object.keys(ROSTER).filter(cd=>{
    if(obj(obj(DB.businesses)[cd]).status==='approved') return false;      // 사장 제외
    if(obj(obj(DB.civilServants)[cd]).status==='approved') return false;   // 공무원 제외
    return pred(cd);
  }).sort((a,b)=>((ROSTER[a].no||0)-(ROSTER[b].no||0)));
}
// 1일차: 사장·공무원이 아니면서 이력서를 한 곳도 내지 않은 학생
function noResumeCard(){
  const submitted = _submittedResumeSet();
  const list = _stuListExcludingRoles(cd=> !submitted.has(cd));
  let h = '<div class="card"><h2>📭 이력서 미제출 <span class="badge '+(list.length?'b-no':'b-ok')+'">'+list.length+'</span></h2>';
  h += '<p class="muted">사장·공무원이 아니면서 <b>이력서를 한 곳도 내지 않은</b> 학생이에요. 이름 옆 ↗로 학생 화면을 열 수 있어요.</p>';
  if(!list.length) h += '<div class="empty">해당 학생이 없어요! 🎉</div>';
  else { h += '<div class="role-col-body">'; list.forEach(cd=> h += _roleChip(cd)); h += '</div>'; }
  return h + '</div>';
}
// 2일차: 사장·공무원이 아니면서 어느 회사에도 선정(합격·후보)되지 못한 학생
function notSelectedCard(){
  const picked = _selectedSet();
  const list = _stuListExcludingRoles(cd=> !picked.has(cd));
  let h = '<div class="card"><h2>🕵️ 미선정 학생 <span class="badge '+(list.length?'b-no':'b-ok')+'">'+list.length+'</span></h2>';
  h += '<p class="muted">사장·공무원이 아니면서 <b>어느 회사에도 선정(합격·후보)되지 못한</b> 학생이에요.</p>';
  if(!list.length) h += '<div class="empty">모두 어딘가에 선정됐어요! 🎉</div>';
  else { h += '<div class="role-col-body">'; list.forEach(cd=> h += _roleChip(cd)); h += '</div>'; }
  return h + '</div>';
}
function viewTeacher(){
  const p = phase();
  let h = '';

  // 단계 선택: 일차 버튼을 누르면 바로 그 일차로 이동(학생 화면도 함께)
  h += '<div class="card"><h2>🎬 활동 단계 <span class="muted" style="font-weight:400">— 일차를 누르면 바로 이동</span></h2>';

  h += '</div></div>';

  if(p===0){ h += bizApprovalCard(); h += civilApprovalCard(); }

function setTeacherDay(i){ window._teacherDay = i; try{ localStorage.setItem('startup_teacherDay', i); }catch(_){}; render(); }

/* 교사: 사업계획서의 '직원 모집' 내용 표시/수정 (승인 카드에서 사용).
   수정은 businesses/<cd>에 직접 write → 학생(businesses 전체 구독)에게 바로 반영 */
function _recruitYN(v){ return v==='있음' ? '있음' : '없음'; }
function recruitSection(cd, b){
  b = obj(b);
  if((window._bizRecEdit||{})[cd]) return recruitEditor(cd, b);
  return `<div class="kv" style="background:#f6f8fb"><b>📢 직원 모집</b><br>`
    + `<b>담당업무</b> ${esc(b.duty||'-')}<br>`
    + `<b>모집인원</b> ${_numShow(b.headcount, '명')} · <b>근무시간</b> ${_numShow(b.workDays, '시간')}<br>`
    + `<b>자격·우대</b> ${esc(b.qualification||'-')}<br>`
    + `<b>시급</b> ${esc(b.weeklyPay!=null?b.weeklyPay+' 쿠키':'-')} · <b>성과급</b> ${_recruitYN(b.bonus)} · <b>4대보험</b> ${_recruitYN(b.ins4)}<br>`
    + `<b>기타</b> ${esc(b.condition||'-')}</div>`;

function recruitEditor(cd, b){

  h += `<div class="field"><label>대여물품 (교사가 대여)</label><textarea id="eb_itemsTchr_${cd}">${esc(bg.itemsTchr||'')}</textarea></div>`;
  h += _numField('예산신청 — 현금 (쿠팡·문구점·편의점에서 직접 구입, 투자 설명회 점수로 차등 지급)', 'eb_cost_'+cd, bg.cost!=null?bg.cost:'', '원');

  h += '<div class="divider"></div><div style="font-weight:800;margin-bottom:6px">📢 직원 모집 수정</div>';

function toggleBizRecruit(cd){ window._bizRecEdit = window._bizRecEdit || {}; window._bizRecEdit[cd] = !window._bizRecEdit[cd]; scheduleRender(); }
function saveBizRecruit(cd){
  const g = id => $(id);
  if(!g('er_duty_'+cd)) return;   // 에디터가 없으면 무시
  const upd = {
    name:          g('eb_name_'+cd).value.trim(),
    desc:          g('eb_desc_'+cd).value.trim(),
    plan:          g('eb_plan_'+cd).value.trim(),
    'budget/items': g('eb_items_'+cd).value.trim(),
    'budget/itemsTchr': g('eb_itemsTchr_'+cd).value.trim(),
    'budget/cost':  Math.max(0, parseInt(g('eb_cost_'+cd).value)||0),
    'budget/cookie': Math.max(0, parseInt(g('eb_cookie_'+cd).value)||0),
    duty:          g('er_duty_'+cd).value.trim(),
    headcount:     Math.max(0, parseInt(g('er_head_'+cd).value)||0),
    workDays:      g('er_days_'+cd).value.trim(),
    qualification: g('er_qual_'+cd).value.trim(),
    weeklyPay:     Math.max(0, parseInt(g('er_pay_'+cd).value)||0),
    bonus:         g('er_bonus_'+cd).value,
    ins4:          g('er_ins4_'+cd).value,
    condition:     g('er_cond_'+cd).value.trim()
  };
  // 학생에게 보이는 채용공고는 스냅샷(jobPosts/cd)에서 읽으므로, 승인돼 공고가 게시된 회사는
  // 모집 관련 필드를 jobPosts에도 함께 반영해야 학생 화면에 수정이 나타난다.
  const all = {};
  Object.entries(upd).forEach(([k,v])=> all['businesses/'+cd+'/'+k]=v);
  const jp = obj(obj(DB.jobPosts)[cd]);
  if(jp.postedAt){
    all['jobPosts/'+cd+'/duty']=upd.duty;
    all['jobPosts/'+cd+'/headcount']=upd.headcount;
    all['jobPosts/'+cd+'/workDays']=upd.workDays;
    all['jobPosts/'+cd+'/qualification']=upd.qualification;
    all['jobPosts/'+cd+'/weeklyPay']=upd.weeklyPay;
    all['jobPosts/'+cd+'/condition']=upd.condition;
  }
  S.update(all).then(()=>{
    window._bizRecEdit = window._bizRecEdit || {}; window._bizRecEdit[cd] = false;
    toast('사업계획서를 수정했어요 — 학생에게 반영됩니다'); scheduleRender();
  }).catch(()=>toast('저장 실패 — 다시 시도해 주세요'));
}

/* 사업 정리 업데이트: 채용공고·선발·합격통지 정리. statusVal=null이면 레코드 삭제, 값이면 status 변경 */
function _bizPurgeUpd(cd, statusVal){
  const upd = { ['jobPosts/'+cd]:null, ['selections/'+cd]:null, ['hires/'+cd]:null };
  Object.keys(obj(DB.contracts)).forEach(k=>{ if(k.indexOf(cd+'_')===0) upd['contracts/'+k]=null; });   // 이 사장이 맺은 근로계약 정리
  entries(DB.offers).forEach(([acd, byBiz])=>{ if(obj(byBiz)[cd]){ upd['offers/'+acd+'/'+cd]=null; if(obj(obj(byBiz)[cd]).status==='accepted') upd['acceptedLock/'+acd]=null; } });
  if(statusVal===null) upd['businesses/'+cd]=null; else upd['businesses/'+cd+'/status']=statusVal;
  return upd;
}

function saveSummaryRow(cd){
  const nm=$('sm_name_'+cd), it=$('sm_items_'+cd), itt=$('sm_itemsT_'+cd);
  const won=parseInt(($('sm_won_'+cd)||{}).value)||0, ck=parseInt(($('sm_ck_'+cd)||{}).value)||0, pct=parseInt(($('sm_pct_'+cd)||{}).value)||0, rent=parseInt(($('sm_rent_'+cd)||{}).value)||0;
  const inv = obj(obj(obj(DB.businesses)[cd]).investment);

  delete window._smDraft[cd];
  // 이미 전송된 약정이거나 투자값/대여료를 입력한 경우에만 투자약정 저장/전송(준비물만 고쳤을 땐 약정을 건드리지 않음)
  if(inv.sentAt || won>0 || ck>0 || pct>0 || rent>0){ sendInvestmentVals(cd, won, ck, pct, rent); }
  else { toast('저장했어요 — 학생에게 반영됩니다'); }

}

async function _doResetAll(){
  window._bizPubHash = {};   // 슬림미러 해시가드 초기화 → 재생성한 회사가 bizPub에 확실히 반영되게(초기화 후 stale-skip 방지)
  const tSign = obj(DB.meta).teacherSignUrl;   // 교사 서명은 보존
  // 사장별 부스(kiosk_booths/sb_*)와 관련 데이터도 제거 — 공무원(isGov) 등 그 외 부스는 보존
  const rootUpd = {};
  const sbIds = entries(obj(window._kioskBooths))
    .filter(([id,b])=> String(id).startsWith('sb_') && !(b&&b.isGov))
    .map(([id])=> id);
  const sbSet = new Set(sbIds);
  sbIds.forEach(id=>{
    rootUpd['kiosk_booths/'+id]=null;
    rootUpd['kiosk_booth_items/'+id]=null;
    rootUpd['kiosk_booth_stats/'+id]=null;        // 매출 집계
    rootUpd['kiosk_payroll/settled/'+id]=null;     // 매출 워터마크
    rootUpd['kiosk_payroll/slock/'+id]=null;       // 매출구간 정산 선점락
  });
  // 🧹 사장 부스의 매출·정산 '기록'도 함께 정리해 유령 매출(부스 id 재사용 시 옛 매출 부활)을 막는다.
  // ⚠️ 절대 건드리지 않는 것: ClassData/EventShop/stu (shopUsed·inv = 학생 실제 잔액).
  //    이미 지급/차감된 쿠키·상점이용권은 정산 '시점'에 이미 반영됐고, 기록 노드를 지워도 되돌지 않음
  //    (여기에 환불/역산을 넣으면 "2쿠키→0쿠키" 사고가 나므로 기록 삭제만 한다).
  if (sbIds.length){
    try {
      for (const id of sbIds){
        // 정산내역 아카이브 + 보류 주문(boothId 매칭) 삭제 (.indexOn:["boothId"] 권장)
        const arv = (await DBROOT.child('kiosk_orders_archive').orderByChild('boothId').equalTo(id).once('value')).val() || {};
        Object.keys(arv).forEach(k=> rootUpd['kiosk_orders_archive/'+k]=null);
        const orv = (await DBROOT.child('kiosk_orders').orderByChild('boothId').equalTo(id).once('value')).val() || {};
        Object.keys(orv).forEach(k=> rootUpd['kiosk_orders/'+k]=null);
      }
      // 월급 정산 신청/완료 기록(boothId 또는 revenueMarkKey 매칭) 삭제 + 해당 선점락 정리
      const py = (await DBROOT.child('kiosk_payroll').once('value')).val() || {};
      ['requests','paid'].forEach(sec=>{
        const m = py[sec] || {};
        Object.keys(m).forEach(rid=>{
          const r = m[rid] || {};
          if (sbSet.has(r.boothId) || sbSet.has(r.revenueMarkKey)){
            rootUpd['kiosk_payroll/'+sec+'/'+rid]=null;
            if (py.lock && py.lock[rid]!=null) rootUpd['kiosk_payroll/lock/'+rid]=null;
          }
        });
      });
    } catch(_){}
  }
  S.remove().then(()=>{
    if(tSign) S.child('meta/teacherSignUrl').set(tSign);
    const done = ()=> toast('초기화 완료'+(tSign?' (교사 서명 보존)':'')+' · 사장 부스·매출 기록 정리 (학생 쿠키는 유지)');
    if(Object.keys(rootUpd).length) DBROOT.update(rootUpd).then(done).catch(done); else done();
  }); }

/* ===== 학생 현황 · 역할 관리 (사장/공무원/아르바이트/실업자) ===== */
const ROLE_META = { boss:{t:'사장',c:'b-ok'}, civil:{t:'공무원',c:'b-info'}, alba:{t:'아르바이트',c:'b-wait'}, jobless:{t:'실업자',c:'b-no'} };
function stuRole(cd){
  if(obj(obj(DB.businesses)[cd]).status==='approved') return 'boss';
  if(obj(obj(DB.civilServants)[cd]).status==='approved') return 'civil';
  const employed = entries(obj(DB.offers)[cd]).some(([bc,o])=>o.status==='accepted');
  if(employed) return 'alba';
  if(obj(DB.roleOverride)[cd]==='alba') return 'alba';
  return 'jobless';
}
function _roleChip(cd){
  const r = ROSTER[cd]||{};
  const nm = esc((r.no!=null?r.no+' ':'')+(r.nm||cd));
  return `<div class="role-chip" draggable="true" ondragstart="roleDragStart(event,'${cd}')" ondragend="roleDragEnd(event)"><span>${nm}</span><span class="chip-open" title="학생 화면 새 탭" onclick="event.stopPropagation();openStudentTab('${cd}')">↗</span></div>`;
}
function _roleCol(role, list){
  let h = `<div class="role-col" ondragover="roleDragOver(event)" ondragleave="roleDragLeave(event)" ondrop="roleDrop(event,'${role}')">`;
  h += `<div class="role-col-h"><span class="badge ${ROLE_META[role].c}">${ROLE_META[role].t}</span> <b>${list.length}</b></div>`;
  h += '<div class="role-col-body">';
  list.forEach(cd=> h += _roleChip(cd));
  if(!list.length) h += '<div class="role-empty">여기로 끌어다 놓기</div>';
  h += '</div></div>';
  return h;
}
function _bossOf(cd){ const acc = entries(obj(DB.offers)[cd]).find(([bc,o])=>o.status==='accepted'); return acc?acc[0]:null; }
/* 겸직: 이 학생이 근무하는 모든 사장(수락된 통지 전부) */
function _bossesOf(cd){ return entries(obj(DB.offers)[cd]).filter(([bc,o])=>o.status==='accepted').map(([bc])=>bc); }
function teacherStatusBoard(){
  const cds = Object.keys(ROSTER).sort((a,b)=>(ROSTER[a].no||0)-(ROSTER[b].no||0));
  let h = '<div class="card"><h2>👥 학생 현황 · 역할 관리</h2>';
  if(!cds.length){ h += '<div class="empty">명단을 불러오지 못했어요.</div></div>'; return h; }
  const bosses=[], civils=[], jobless=[], empByBoss={}; const albaSet=new Set();
  cds.forEach(cd=>{ const r=stuRole(cd);
    if(r==='boss') bosses.push(cd);
    else if(r==='civil') civils.push(cd);
    else if(r==='alba'){
      albaSet.add(cd);
      const bl=_bossesOf(cd);   // 겸직이면 근무하는 모든 사장 아래에 표시
      if(bl.length) bl.forEach(bc=>(empByBoss[bc]=empByBoss[bc]||[]).push(cd));
      else (empByBoss['_none']=empByBoss['_none']||[]).push(cd);
    }
    else jobless.push(cd);
  });
  const albaCount = albaSet.size;   // 인원수는 중복 제외(겸직 1명은 1명)
  // 상단: 공무원 · 사장 · 아르바이트(사장 우측) / 하단: 실업자
  h += '<div class="rb-top">';
  h += _roleCol('civil', civils);
  h += _roleCol('boss', bosses);
  // 아르바이트(사장별) — 사장 우측. 각 사장 칸으로 드래그하면 그 사장의 아르바이트로 배정
  h += '<div class="sb-wrap"><div class="role-col-h"><span class="badge b-wait">아르바이트</span> <b>'+albaCount+'</b></div>';
  h += '<table class="sb-table"><tr><th>사장</th><th>아르바이트</th></tr>';
  if(!bosses.length && !albaCount){ h += '<tr><td colspan="2"><div class="role-empty">아직 사장이 없어요. 먼저 사장을 배정하세요.</div></td></tr>'; }
  const _albaCell = (bc, emps)=> `<td class="sb-alba"><div class="sb-emps" ondragover="roleDragOver(event)" ondragleave="roleDragLeave(event)" ondrop="albaDrop(event,'${bc}')">`
      + (emps.length? emps.map(_roleChip).join('') : '<span class="muted" style="font-size:12px">—</span>') + '</div></td>';
  bosses.forEach(bc=>{ h += '<tr><td class="sb-boss">'+_roleChip(bc)+'</td>'+_albaCell(bc, empByBoss[bc]||[])+'</tr>'; });
  const _shown = new Set(bosses);
  Object.keys(empByBoss).forEach(bc=>{
    if(bc==='_none' || _shown.has(bc)) return;
    h += '<tr><td class="sb-boss">'+_roleChip(bc)+'</td>'+_albaCell(bc, empByBoss[bc])+'</tr>';
  });
  if(empByBoss['_none'] && empByBoss['_none'].length){
    h += '<tr><td class="sb-boss"><span class="muted" style="font-size:12px">(직접지정)</span></td><td class="sb-alba"><div class="sb-emps">'+empByBoss['_none'].map(_roleChip).join('')+'</div></td></tr>';
  }
  h += '</table></div>';   // close sb-wrap
  h += '</div>';           // close rb-top
  // 하단: 실업자 (전체 너비)
  h += '<div class="divider"></div>';
  h += _roleCol('jobless', jobless);
  h += '</div>';           // close card
  return h;
}
/* 역할 칸반 드래그 */
let _dragCd = null;
function roleDragStart(e, cd){ _dragCd = cd; try{ e.dataTransfer.setData('text/plain', cd); e.dataTransfer.effectAllowed='move'; }catch(_){}; if(e.currentTarget) e.currentTarget.classList.add('dragging'); }
function roleDragEnd(e){ if(e.currentTarget) e.currentTarget.classList.remove('dragging'); }
function roleDragOver(e){ e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drag-over'); }
function roleDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function roleDrop(e, role){ e.preventDefault(); e.currentTarget.classList.remove('drag-over'); let cd=_dragCd; if(!cd&&e.dataTransfer){ try{ cd=e.dataTransfer.getData('text/plain'); }catch(_){} } _dragCd=null; if(cd) setStuRole(cd, role); }
// 사장·아르바이트 패널: 아르바이트 칸(.sb-emps)에 놓으면 무시, 사장 칸에 놓을 때만 사장 지정
function sbDrop(e){ e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if(e.target&&e.target.closest&&e.target.closest('.sb-alba')){ _dragCd=null; return; } let cd=_dragCd; if(!cd&&e.dataTransfer){ try{ cd=e.dataTransfer.getData('text/plain'); }catch(_){} } _dragCd=null; if(cd) setStuRole(cd, 'boss'); }
// 아르바이트를 특정 사장에게 배정(드롭)
function albaDrop(e, bc){ e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('drag-over'); let cd=_dragCd; if(!cd&&e.dataTransfer){ try{ cd=e.dataTransfer.getData('text/plain'); }catch(_){} } _dragCd=null; if(cd) assignAlbaToBoss(cd, bc); }
function assignAlbaToBoss(cd, bc){
  if(cd===bc){ toast('사장을 자기 회사 알바로 넣을 수 없어요'); return; }
  const nm = nmeOf(cd);
  const bn = obj(obj(DB.businesses)[bc]).name || nmeOf(bc);
  if(stuRole(cd)==='alba' && _bossOf(cd)===bc) return;   // 이미 그 사장 알바
  prettyConfirm('아르바이트 배정', esc(nm)+' 학생을 <b>'+esc(bn)+'</b>의 아르바이트로 배정할까요?', ()=>{
    const pay = (obj(obj(DB.jobPosts)[bc]).weeklyPay)||0;
    const upd = {};
    upd['businesses/'+cd]=null; upd['jobPosts/'+cd]=null; upd['selections/'+cd]=null;   // 사장 역할 해제
    upd['civilServants/'+cd]=null;                                                       // 공무원 해제
    _clearWorkerContracts(upd, cd);                                                      // 옛 사장 근로계약(서명 포함) 제거 → 새 사장이 다시 작성
    // 다른 사장에게 걸린 기존 고용 해제
    entries(obj(DB.offers)[cd]).forEach(([obc,o])=>{ if((o.status==='accepted'||o.status==='pending') && obc!==bc) upd['offers/'+cd+'/'+obc+'/status']='declined'; });
    entries(DB.hires).forEach(([obc,hs])=>{ if(obj(hs)[cd] && obc!==bc) upd['hires/'+obc+'/'+cd]=null; });
    // bc에 고용 확정
    upd['acceptedLock/'+cd]=bc;
    upd['offers/'+cd+'/'+bc]={status:'accepted', offerPay:pay, decidedAt:TS, notifiedAt:TS};
    upd['hires/'+bc+'/'+cd]={weeklyPay:pay, confirmedAt:TS};
    upd['roleOverride/'+cd]=null;
    S.update(upd).then(()=>toast(nm+' → '+bn+' 아르바이트')).catch(()=>toast('배정 실패'));
  }, '🧑‍🍳');
}
function setStuRole(cd, role){
  const nm = nmeOf(cd), label = ROLE_META[role].t;
  if(stuRole(cd)===role) return;
  // 드롭 이벤트 중 동기 confirm()은 브라우저가 막을 수 있어 비차단 모달 사용
  prettyConfirm('역할 변경', esc(nm)+' 학생을 <b>'+esc(label)+'</b>(으)로 바꿀까요?', ()=>_applyStuRole(cd, role, nm, label), '🔄');
}
function _applyStuRole(cd, role, nm, label){
  const upd = {};
  const clearBiz = ()=>{ upd['businesses/'+cd]=null; upd['jobPosts/'+cd]=null; upd['selections/'+cd]=null; };
  const clearCivil = ()=>{ upd['civilServants/'+cd]=null; };
  const clearEmployment = ()=>{
    upd['acceptedLock/'+cd]=null; _clearWorkerContracts(upd, cd);   // 근로계약(서명 포함)도 함께 정리
    entries(obj(DB.offers)[cd]).forEach(([bc,o])=>{ if(o.status==='accepted'||o.status==='pending') upd['offers/'+cd+'/'+bc+'/status']='declined'; });
    entries(DB.hires).forEach(([bc,hs])=>{ if(obj(hs)[cd]) upd['hires/'+bc+'/'+cd]=null; });
  };
  if(role==='boss'){
    const b = obj(DB.businesses)[cd];
    upd['businesses/'+cd+'/ownerCd']=cd; upd['businesses/'+cd+'/ownerNm']=nm;
    if(!b.name) upd['businesses/'+cd+'/name']=nm+'의 가게';
    if(!b.createdAt) upd['businesses/'+cd+'/createdAt']=TS;
    upd['businesses/'+cd+'/status']='approved'; upd['businesses/'+cd+'/approvedAt']=TS;
    if(!obj(DB.jobPosts)[cd]) upd['jobPosts/'+cd]={ duty:b.duty||'', qualification:b.qualification||'', headcount:(b.headcount||1), workDays:b.workDays||'', condition:b.condition||'', weeklyPay:(b.weeklyPay||0), open:true, postedAt:TS };
    clearCivil(); upd['roleOverride/'+cd]=null;
  } else if(role==='civil'){
    upd['civilServants/'+cd+'/cd']=cd; upd['civilServants/'+cd+'/nm']=nm;
    upd['civilServants/'+cd+'/status']='approved'; upd['civilServants/'+cd+'/approvedAt']=TS;
    clearBiz(); upd['roleOverride/'+cd]=null;
  } else {
    clearBiz(); clearCivil();
    if(role==='jobless') clearEmployment();
    upd['roleOverride/'+cd]=role;
  }
  S.update(upd).then(()=>toast(nm+' → '+label)).catch(()=>toast('변경 실패'));
}

function viewBoss(){
  const b = myBiz();
  const cd = ME.cd;
  let h = '';
  h += `<div class="card"><div class="biz-head"><h2 style="margin:0">🏪 ${esc(b.name||'내 사업')}</h2>`;
  h += bizStatusBadge(b.status)+'</div></div>';

  if(b.status!=='approved'){
    // 계획서 작성/수정 + 상태
    h += planEditorCard(b);
    if(b.status==='submitted') h += '<div class="card"><div class="empty">✅ 제출 완료! 선생님 승인을 기다리는 중이에요.</div></div>';
    if(b.status==='rejected') h += '<div class="card"><div class="empty">반려되었습니다. 계획서를 고쳐서 다시 제출해 주세요.</div></div>';
    return h;
  }

  // 승인된 사장 (사업가는 본인이 면접 대상이라 면접 질문·채점은 보지 않음)
  h += bossBoothCard(cd);      // 3일차: 우리 부스 — 최상단 (2일차 이하엔 빈 카드)
  h += bossResultCard(cd);     // 2일차+: 우리 회사 직원 — 상단(2일차)/부스 하단(3일차)
  h += bossPayrollCard(cd);    // 2일차+: 월급 지급 — 직원 카드 바로 아래
  if(phase()<2) h += bossInvestmentCard(cd);   // 1일차: 투자약정서는 상단 유지
  h += bossJobPostCard(cd);
  h += bossHiringCard(cd);     // 1일차: 지원자 심사·선발
  h += bossContractCard(cd);   // 2일차+: 아르바이트 근로계약서 작성·서명
  if(phase()>=2) h += bossInvestmentCard(cd);  // 2일차+: 투자약정서를 근로계약서 하단으로 이동
  h += bossRehireCard(cd);     // 3일차: 추가 채용공고 + 실업자 추가 채용
  return h;
}

/* 사장: 채용 결과 — 수락(입사확정)한 직원 표시 (2일차부터) */
function bossResultCard(cd){
  if(phase()<2) return '';

  if(!names.length) h += '<div class="empty">아직 수락한 직원이 없어요.<br><span class="muted">합격자가 거절하면 후보에게 자동으로 넘어가요.</span></div>';

/* 사장: 월급 지급 — 직원별 금액 확인 후 교사에게 정산 요청 (2일차+)
   payroll/<사장코드>/<reqId> = {bossCd, items:[{cd,pay}], total, status:pending|paying|paid|rejected} */
function bossPayrollCard(cd){
  if(phase()<2) return '';
  const myHires = obj(obj(DB.hires)[cd]);
  const emps = Object.keys(myHires);
  if(!emps.length) return '';
  const reqs = obj(obj(DB.payroll)[cd]);
  const pending = entries(reqs).filter(([id,r])=>r && (r.status==='pending'||r.status==='paying'));
  const locked = pending.length>0;
  let h = '<div class="card"><h2>💰 시급 지급</h2>';
  h += '<p class="muted">직원에게 줄 <b>시급(시간당 쿠키)</b>을 확인하고 <b>정산 요청</b>을 보내세요. 사장 부담분은 <b>상점이용권부터</b> 쓰고(쿠키와 1:1), 모자라면 쿠키에서 빠져나가요. 쿠키+이용권이 부족하면 요청할 수 없어요.</p>';
  let total = 0;
  emps.forEach(acd=>{
    const pay = (obj(myHires[acd]).weeklyPay)||0; total += pay;
    h += `<div class="list-item"><b>🙋 ${esc(nmeOf(acd))}</b> <span style="margin-left:auto"><input id="pay_${esc(cd)}_${esc(acd)}" type="number" min="0" value="${esc(pay)}" style="width:90px" ${locked?'disabled':''}> 쿠키 지급</span></div>`;
  });
  if(locked){
    const r = pending[0][1];
    h += `<div class="empty">⏳ 정산 요청을 보냈어요 (총 ${esc(r.total||0)}쿠키). 선생님 승인을 기다리는 중…</div>`;
  } else {
    h += `<div class="row" style="justify-content:space-between;align-items:center;margin-top:8px"><span class="muted">기본 합계 ${esc(total)}쿠키</span><button class="btn-grn" onclick="requestPayroll('${esc(cd)}')">📨 시급 지급 요청</button></div>`;
  }
  const paid = entries(reqs).filter(([id,r])=>r && r.status==='paid').sort((a,b)=>(b[1].paidAt||0)-(a[1].paidAt||0)).slice(0,3);
  if(paid.length){
    h += '<div class="divider"></div><div class="muted" style="margin-bottom:4px">최근 지급</div>';
    paid.forEach(([id,r])=>{ h += `<div class="list-item"><span>✅ 총 ${esc(r.total||0)}쿠키</span> <span class="muted" style="margin-left:auto">${(r.items||[]).map(it=>esc(nmeOf(it.cd))+' '+esc(it.pay)).join(', ')}</span></div>`; });
  }
  if(!locked && entries(reqs).some(([id,r])=>r && r.status==='rejected')){
    h += '<div class="empty" style="color:#c0392b">지난 요청이 거절되었어요. 금액을 확인하고 다시 요청해 주세요.</div>';
  }
  h += '</div>';
  return h;
}
async function requestPayroll(cd){
  const myHires = obj(obj(DB.hires)[cd]);
  const items = []; let total = 0;
  Object.keys(myHires).forEach(acd=>{
    const el = $('pay_'+cd+'_'+acd);
    const pay = Math.max(0, parseInt(el && el.value)||0);
    if(pay>0){ items.push({cd:acd, pay}); total += pay; }
  });
  if(!items.length){ toast('지급할 금액을 입력하세요'); return; }
  // 🛡️ 중복 요청 차단: 이미 대기(pending)·처리중(paying) 요청이 있으면 새로 만들지 않음.
  //    (재클릭·두 기기 동시요청으로 pending이 2건 생겨 교사가 둘 다 승인 → 직원 이중지급·사장 이중차감 방지)
  if(entries(obj(obj(DB.payroll)[cd])).some(([id,r])=> r && (r.status==='pending' || r.status==='paying'))){
    prettyAlert('이미 정산 요청이 있어요', '먼저 보낸 <b>시급 정산 요청</b>이 아직 대기 중이에요.<br>선생님이 승인/거절한 뒤에 다시 요청해 주세요.', '🧮');
    return;
  }
  // 🎟️ 사장 쿠키 + 상점이용권(1:1)이 시급 총액에 모자라면 요청 자체를 막고 예쁜 창으로 안내
  const info = await _bossShopInfo(cd);
  if(!info){ prettyAlert('요청할 수 없어요', '이벤트 상점에서 <b>사장님 계정</b>을 찾지 못했어요.<br>선생님께 문의해 주세요.', '⚠️'); return; }
  if(info.avail + info.voucherCount < total){
    prettyAlert('쿠키가 부족해요',
      '시급 총액 <b>'+total+'개</b>를 지급하려면 사장님의 <b>쿠키 + 상점이용권</b>이 <b>'+total+'개</b> 이상 있어야 해요.<br><br>지금은 쿠키 <b>'+info.avail+'🍪</b> + 상점이용권 <b>'+info.voucherCount+'장</b> = <b>'+(info.avail+info.voucherCount)+'개</b>뿐이라 <b style="color:#c0392b">지급 요청을 보낼 수 없어요.</b><br><span class="muted">상점이용권은 쿠키와 1:1이고, 지급할 때 이용권부터 사용해요.</span>', '🍪');
    return;
  }
  const vUse = Math.min(info.voucherCount, total), cUse = total - vUse;
  prettyConfirm('시급 지급 요청',
    '직원 <b>'+items.length+'명</b>에게 <b>총 '+total+'개</b>(시간당)를 지급하도록 선생님께 요청할까요?<br><span class="muted">승인되면 사장 부담 '+total+'개 중 <b>상점이용권 '+vUse+'장</b> + <b>쿠키 '+cUse+'🍪</b>가 빠져나가요. (이용권 우선 사용)</span>', ()=>{
    // 확인 시점 재확인(모달 여는 사이 다른 요청이 생겼을 수 있음) + busy 플래그로 이중 전송 차단
    window._payReqBusy = window._payReqBusy || {};
    if(window._payReqBusy[cd]) return;
    if(entries(obj(obj(DB.payroll)[cd])).some(([id,r])=> r && (r.status==='pending' || r.status==='paying'))){ toast('이미 대기 중인 요청이 있어요'); return; }
    window._payReqBusy[cd] = true;
    const ref = S.child('payroll/'+cd).push();
    ref.set({ bossCd:cd, items, total, status:'pending', requestedAt:TS })
      .then(()=>{ window._payReqBusy[cd]=false; toast('정산 요청을 보냈어요! 📨'); })
      .catch(()=>{ window._payReqBusy[cd]=false; toast('요청 실패'); });
  }, '💰');
}

function bizStatusBadge(st){
  if(st==='approved') return '<span class="badge b-ok">사장 승인됨</span>';
  if(st==='submitted') return '<span class="badge b-wait">승인 대기</span>';
  if(st==='rejected') return '<span class="badge b-no">반려됨</span>';
  return '<span class="badge b-info">작성 중</span>';
}

/* ---- 자동 로컬 임시저장: 임시저장을 안 눌러도 입력을 localStorage에 보관.
       서버 수신 지연·재렌더로 인한 입력 유실/덮어쓰기 방지(로컬 우선 프리필) ---- */
/* 숫자만 입력받고 뒤에 단위(명/시간/쿠키 등)를 붙여 보여주는 입력 필드 */
function _numField(label, id, val, unit, attr){
  const v = (val==null || val==='') ? '' : esc(val);
  return `<div class="field"><label>${label}</label><div class="num-wrap"><input id="${id}" type="number" min="0" step="1" inputmode="numeric" onkeydown="if(['e','E','+','-','.'].includes(event.key))event.preventDefault()" ${attr||''} value="${v}"><span class="unit">${unit}</span></div></div>`;
}
/* 근무시간 등 숫자 표시에 단위 붙이기(빈값이면 -) */
function _numShow(v, unit){ return (v==null || v==='') ? '-' : (esc(v)+unit); }
function _draftKey(kind){ return 'startup_draft_'+kind+'_'+(ME&&ME.cd); }
function getDraftLocal(kind){ try{ return JSON.parse(localStorage.getItem(_draftKey(kind))||'null'); }catch(_){ return null; } }
function setDraftLocal(kind, data){ try{ localStorage.setItem(_draftKey(kind), JSON.stringify(data)); }catch(_){} }
function clearDraftLocal(kind){ try{ localStorage.removeItem(_draftKey(kind)); }catch(_){} }
function _optSel(list, sel){ return list.map(o=>`<option ${o===sel?'selected':''}>${esc(o)}</option>`).join(''); }
function autosavePlan(){ setDraftLocal('plan', { name:$('p_name').value, ceo:$('p_ceo').value, desc:$('p_desc').value, plan:$('p_plan').value, items:$('p_items').value, itemsTchr:$('p_itemsTchr').value, cost:$('p_cost').value, cookie:$('p_cookie').value, duty:$('p_duty').value, qual:$('p_qual').value, head:$('p_head').value, days:$('p_days').value, bonus:$('p_bonus').value, ins4:$('p_ins4').value, cond:$('p_cond').value, pay:$('p_pay').value, at:Date.now() }); }
function autosaveCivil(){ setDraftLocal('civil', { motive:$('cs_motive').value, strength:$('cs_strength').value, weakness:$('cs_weakness').value, resolve:$('cs_resolve').value, at:Date.now() }); }

function savePlan(submit){
  const data = {
    ownerCd: ME.cd, ownerNm: ME.nm,
    name: $('p_name').value.trim(), ceo: $('p_ceo').value.trim(),
    desc: $('p_desc').value.trim(), plan: $('p_plan').value.trim(),
    budget:{ items:$('p_items').value.trim(), itemsTchr:$('p_itemsTchr').value.trim(), cost:Math.max(0, Math.min(10000, parseInt($('p_cost').value)||0)), cookie:Math.max(0, Math.min(100, parseInt($('p_cookie').value)||0)) },
    duty: $('p_duty').value.trim(), qualification: $('p_qual').value.trim(),
    headcount: Math.max(0, parseInt($('p_head').value)||0),
    workDays: $('p_days').value.trim(),
    bonus: $('p_bonus').value, ins4: $('p_ins4').value,
    condition: $('p_cond').value.trim(), weeklyPay: Math.max(0, parseInt($('p_pay').value)||0),
    status: submit?'submitted':'draft', updatedAt:TS
  };
  if(submit){
    const req = [[data.name,'업체명'],[data.ceo,'대표자 이름'],[data.desc,'사업 설명'],[data.plan,'운영 계획'],
      [data.budget.items,'준비물'],[data.duty,'담당 업무'],[data.workDays,'근무 시간'],[data.qualification,'자격 및 우대사항']];
    const missing = req.filter(([v])=>!String(v||'').trim()).map(([,n])=>n);
    if(data.headcount<=0) missing.push('모집 인원');
    if(data.weeklyPay<=0) missing.push('시급');
    if(missing.length){ prettyConfirm('제출할 수 없어요', '다음 항목을 채워야 제출할 수 있어요:<br><b style="color:#c0392b">'+esc(missing.join(', '))+'</b>', null, '✍'); return; }
  }
  const doSave = ()=>{
    const cur = myBiz();
    if(!cur || !cur.createdAt) data.createdAt = TS;
    // 임시저장(submit=false)에서는 draft를 지우지 않는다: 느린 네트워크에서 저장 왕복 중 입력한
    // 글자가 .then()의 draft 삭제로 유실되는 것을 방지. 제출(terminal, 폼 비활성화) 때만 정리.
    S.child('businesses/'+ME.cd).update(data).then(()=>{ if(submit) clearDraftLocal('plan'); toast(submit?'제출 완료!':'저장했어요'); });
  };
  if(submit) prettyConfirm('📋 사업계획서 제출', '제출하면 <b style="color:#c0392b">수정·취소할 수 없어요.</b><br>내용을 다시 확인하고 제출할까요?', doSave);
  else doSave();
}

function _rehireApplicants(cd, post){
  post = obj(post);
  const hired = obj(obj(obj(DB.selections)[cd]).hired);
  const myHires = obj(obj(DB.hires)[cd]);
  const offerPay = parseInt(post.weeklyPay)||0;   // 통지 시급 = 현재 공고 시급
  // 이미 입사 확정된 직원(기존 채용)은 숨기고, 아직 확정 안 된(새로 제출한) 지원자만 표시
  const apps = entries(obj(obj(DB.resumes)[cd])).filter(([acd])=> !myHires[acd]).sort((a,b)=>(a[1].submittedAt||0)-(b[1].submittedAt||0));
  if(!apps.length) return '<div class="divider"></div><div class="empty">아직 새 지원자가 없어요.</div>';
  let h = '<div class="divider"></div><div class="grid">';
  apps.forEach(([acd,r],i)=>{
    const picked = !!hired[acd], confirmed = !!myHires[acd];
    const lock = obj(DB.acceptedLock)[acd];
    const employedElsewhere = lock && lock!==cd && !confirmed;   // 다른 회사에 근무 중(겸직 지원 가능)
    const reveal = picked || confirmed;   // 채용 통지를 보낸 뒤(또는 확정)에만 이름 공개
    let act;
    if(confirmed) act = '<div class="row" style="margin-top:8px"><span class="badge b-ok">채용 확정</span></div>';
    else if(picked) act = '<div class="row" style="margin-top:8px"><span class="badge b-wait">통지 대기(수락 기다리는 중)</span></div>';
    else act = `<div class="row" style="margin-top:8px;flex-wrap:wrap;gap:6px;align-items:center">${employedElsewhere?'<span class="badge b-info">💼 다른 곳 근무 중(겸직)</span>':''}<button class="btn-grn btn-sm" onclick="rehireOffer('${cd}','${acd}',${offerPay})">📣 채용 통지 (시급 ${offerPay})</button></div>`;
    h += _applCard(i+1, r, {picked, name: reveal?nmeOf(acd):''}, act);
  });
  h += '</div>';
  return h;
}

// 추가 채용: 새로 확정된 인원이 추가 모집 인원을 채우면 자동 마감(구독 시점 실행 → 새로고침 없이 사장 버튼도 즉시 갱신)
function _maybeAutoCloseRehire(){
  if(IS_TEACHER || !ME) return;
  if(phase()<2) return;   // 추가채용(rehire)은 2일차+ 기능 → 1일차 초기 모집은 어떤 경우에도 자동 마감하지 않음
  const cd = ME.cd;
  const post = obj(obj(DB.jobPosts)[cd]);
  if(!(post.rehire && post.open && post.rehireQuota)) return;
  if(post.rehireBase==null) return;   // 기준선 없으면(옛 데이터) 조기 마감 방지
  const hiredCnt = Object.keys(obj(obj(DB.hires)[cd])).length;
  const newHires = hiredCnt - post.rehireBase;   // 추가 채용 연 시점 이후 새 확정분
  if(newHires < post.rehireQuota) return;
  window._rehCloseBusy = window._rehCloseBusy||{};
  if(window._rehCloseBusy[cd]) return;
  window._rehCloseBusy[cd] = true;
  S.child('jobPosts/'+cd).update({rehire:false, open:false})
    .then(()=>{ window._rehCloseBusy[cd]=false; toast('추가 모집 인원을 다 채워 추가 채용을 자동 마감했어요'); scheduleRender(); })
    .catch(()=>{ window._rehCloseBusy[cd]=false; });
}
function toggleRehire(on){
  const upd = { rehire:on };
  if(on){ upd.open = true; upd.rehireBase = Object.keys(obj(obj(DB.hires)[ME.cd])).length; }   // 여는 시점의 확정 인원을 기준선으로(이후 새 확정분만 카운트)
  S.child('jobPosts/'+ME.cd).update(upd);
  toast(on?'추가 채용공고를 열었어요!':'추가 채용을 마감했어요');
}
function rehireOffer(cd, acd, pay){

    return h;
  }

  // 1일차 심사에서는 published(교사 발표) 상태와 무관하게 항상 선발 버튼을 노출(발표 후 1일차로 돌아와도 선택 가능)
  const submitted = !!sel.submitted;   // 사장이 선발을 교사에게 제출했는지(제출 후엔 잠금 → 수정하기로 해제)
  h += '<div class="grid">';
  const confirmedHires = obj(obj(DB.hires)[cd]);   // 이미 입사 확정(수락)된 직원 → 취소 불가(서버 상태 어긋남 방지)
  apps.forEach(([acd,r],i)=>{
    const isHired = !!hired[acd], isRes = !!reserve[acd];
    const isConfirmed = !!confirmedHires[acd];
    const resOrd = isRes ? (obj(reserve[acd]).order||'') : '';   // 후보 순번
    let act = '<div class="row" style="margin-top:8px">';
    if(isConfirmed) act += '<span class="badge b-ok">입사 확정</span>';   // 발표·수락 완료 → 심사에서 변경 불가
    else if(submitted){   // 제출 완료 상태 → 변경 잠금(수정하기로 해제 후 편집)
      if(isHired) act += '<span class="badge b-ok">채용</span>';
      else if(isRes) act += `<span class="badge b-wait">후보${resOrd}</span>`;
    }
    else if(isHired) act += `<button class="btn-gray btn-sm" onclick="unpick('${cd}','${acd}')">채용 취소</button><span class="badge b-ok">채용</span>`;
    else if(isRes) act += `<button class="btn-gray btn-sm" onclick="unpick('${cd}','${acd}')">후보 취소</button><span class="badge b-wait">후보${resOrd}</span>`;
    else act += `<button class="btn-grn btn-sm" onclick="pickHire('${cd}','${acd}',${r.wantPay||0})">채용</button><button class="btn-pink btn-sm" onclick="pickReserve('${cd}','${acd}')">후보 추가</button>`;
    act += '</div>';
    // 사장에게는 항상 익명(실명은 교사 발표·수락 후 확정직원 카드에서만) → name 미전달
    h += _applCard(i+1, r, {picked:isHired, reserved:isRes}, act);
  });
  h += '</div>';

  h += `<div class="divider"></div><div class="row"><b>선발 ${Object.keys(hired).length}/${quota}명 · 후보 ${Object.keys(reserve).length}명</b> <span class="muted">후보(후보1·2·3…)를 원하는 만큼 뽑아두면 거절 시 순서대로 자동 채용돼요.</span></div>`;
  // 제출하기 / 수정하기 — 사장이 선발·후보 선정을 마치면 교사에게 제출
  h += '<div class="row" style="margin-top:10px;justify-content:flex-end;align-items:center;gap:8px">';
  if(submitted){
    h += `<span class="badge b-ok">✅ 제출 완료</span>`;
  } else {
    h += `<span class="muted">선정을 마쳤으면 선생님께 제출하세요.</span><button class="btn-org btn-sm" onclick="submitSelection('${cd}')">📨 제출하기</button>`;
  }
  h += '</div>';
  h += '</div>';
  return h;
}
/* 1일차: 사장이 선발·후보 선정을 마치고 교사에게 제출(제출 후엔 심사 버튼 잠금, 사장은 스스로 수정 불가) */
function submitSelection(cd){
  const hired = obj(obj(obj(DB.selections)[cd]).hired);
  const none = !Object.keys(hired).length;   // 채용 0명(지원자 없음 포함)도 제출해 마감 허용
  const msg = none
    ? '채용한 지원자가 <b>없습니다</b>. 아무도 채용하지 않고 <b>제출(마감)</b>할까요?<br><span class="muted">제출 후에는 수정할 수 없어요.</span>'
    : '선발 결과를 <b>선생님께 제출</b>할까요?<br><span class="muted">제출 후에는 수정할 수 없어요.</span>';
  prettyConfirm('📨 선발 결과 제출', msg, ()=>{
    S.child('selections/'+cd).update({submitted:true, submittedAt:TS}).then(()=>toast('제출 완료! 📨'));
  }, '📨');
}
/* 교사 전용: 제출 반려 → submitted만 false로(선발/후보 데이터는 보존, 사장이 다시 수정 가능) */
function rejectSubmission(cd){
  if(!IS_TEACHER) return;
  if(!confirm(esc(nmeOf(cd))+' 사장의 제출을 반려할까요?\n선발 내용은 그대로 두고 사장이 다시 수정할 수 있게 됩니다.'))return;
  S.child('selections/'+cd).update({submitted:false}).then(()=>toast('반려 완료 — 사장이 수정 가능'));
}

function _hiredCount(cd){ return Object.keys(obj(obj(obj(DB.selections)[cd]).hired)).length; }

function pickHire(cd, acd, wantPay){
  const quota = (obj(obj(DB.jobPosts)[cd]).headcount)||1;
  const ref = S.child('selections/'+cd+'/hired');
  ref.transaction(cur=>{
    cur = cur||{};
    if(cur[acd]) return cur;                    // 이미 채용
    if(Object.keys(cur).length>=quota) return;  // 정원 초과 → abort
    cur[acd] = { offerPay: wantPay||0, at: Date.now() };
    return cur;
  }, (err,committed)=>{
    if(err) return toast('오류가 발생했어요');
    if(!committed) return toast('모집 정원이 찼어요. 후보로 넣거나 정원을 늘리세요.');
    S.child('selections/'+cd+'/reserve/'+acd).remove();
    toast('채용 후보에 추가');
  });
}
function pickReserve(cd, acd){
  const order = Object.keys(obj(obj(obj(DB.selections)[cd]).reserve)).length+1;
  S.child('selections/'+cd+'/reserve/'+acd).set({order, at:TS});
  S.child('selections/'+cd+'/hired/'+acd).remove();
}
function unpick(cd, acd){
  S.child('selections/'+cd+'/hired/'+acd).remove();
  S.child('selections/'+cd+'/reserve/'+acd).remove();
}

/* 정원 미달분을 후보(순서대로)로 채워 '선발'로 승격 — hired(사본)에 반영하고 upd에 write 경로를 추가.
   선발이 0명이고 후보만 있어도 후보가 선발되어 합격 발표가 되도록 함. */
function _fillFromReserve(cd, hired, upd){
  const sel = obj(obj(DB.selections)[cd]);
  const reserve = obj(sel.reserve);
  const quota = obj(obj(DB.jobPosts)[cd]).headcount || 1;
  let openSlots = quota - Object.keys(hired).length;
  if(openSlots<=0) return;
  const cand = Object.keys(reserve)
    .filter(acd=>!hired[acd])
    .sort((a,b)=>(obj(reserve[a]).order||0)-(obj(reserve[b]).order||0));
  cand.slice(0, openSlots).forEach(acd=>{
    const wp = obj(reserve[acd]).offerPay || obj(obj(obj(DB.resumes)[cd])[acd]).wantPay || 0;
    const rec = { offerPay:wp, at:Date.now() };
    hired[acd] = rec;
    upd['selections/'+cd+'/hired/'+acd] = rec;
    upd['selections/'+cd+'/reserve/'+acd] = null;
  });
}
function publish(cd){
  if(!confirm('합격자를 발표할까요? 발표 후 지원자에게 실명이 공개됩니다.'))return;
  const hired = Object.assign({}, obj(obj(obj(DB.selections)[cd]).hired));
  const upd = {};
  _fillFromReserve(cd, hired, upd);   // 선발 0명·정원 미달이면 후보 승격
  upd['selections/'+cd+'/published']=true; upd['selections/'+cd+'/publishedAt']=TS;
  S.update(upd).then(()=>{
    Object.entries(hired).forEach(([acd,info])=> createOffer(cd, acd, info.offerPay||0));
    toast('합격 발표 완료! 📣');
  }).catch(()=>toast('발표 실패 — 다시 시도해 주세요'));
}

/* 후보 → 채용 승격(재선발). 발표 이후에도 사용 */
/* 교사 클라이언트에서 자동 후보 승격: 발표된 회사에서 합격자가 거절/타사수락(자동거절)하면
   그 자리를 후보 순서대로 자동 채워 offer 발송. 멱등(처리 후 재실행 시 변경 없음). */
function _autoFillDeclines(){
  if(!IS_TEACHER || phase()<2) return;   // 거절 자리 채우기·후보 승격은 발표(2일차+) 후처리 전용. 1일차엔 사장 선발을 건드리지 않음(깜빡→취소 방지)
  const biz = obj(DB.businesses);
  entries(biz).forEach(([cd,b])=>{
    if(b.status!=='approved') return;
    const sel = obj(obj(DB.selections)[cd]);
    if(!sel.published) return;
    const hired = Object.assign({}, obj(sel.hired));
    const reserve = obj(sel.reserve);
    const quota = obj(obj(DB.jobPosts)[cd]).headcount || 1;
    // 1) 거절된 합격자는 자리에서 제거(자리 반환)
    Object.keys(hired).forEach(acd=>{
      const off = obj(obj(DB.offers)[acd])[cd];
      if(off && off.status==='declined'){ S.child('selections/'+cd+'/hired/'+acd).remove(); delete hired[acd]; }
    });
    // 2) 빈 자리만큼 후보를 순서대로 승격 + offer 발송
    let openSlots = quota - Object.keys(hired).length;
    if(openSlots>0){
      const cand = Object.keys(reserve)
        .filter(acd=>!hired[acd])
        .filter(acd=>{ const off=obj(obj(DB.offers)[acd])[cd]; return !off || (off.status!=='pending' && off.status!=='accepted'); })
        .sort((a,b)=>(obj(reserve[a]).order||0)-(obj(reserve[b]).order||0));
      cand.slice(0, openSlots).forEach(acd=>{
        const wp = obj(reserve[acd]).offerPay || obj(obj(obj(DB.resumes)[cd])[acd]).wantPay || 0;
        S.child('selections/'+cd+'/hired/'+acd).set({ offerPay:wp, at:Date.now() });
        S.child('selections/'+cd+'/reserve/'+acd).remove();
        createOffer(cd, acd, wp);
      });
    }
  });
}
/* 교사 단일 작성 슬림 미러: 학생에게 뿌릴 businesses 공개필드만 bizPub/<cd>에 유지(해시가드로 변경분만 write, 삭제 정리).
   학생 팬아웃에서 desc·plan·budget·investment(서명URL 포함)를 제외 → egress 절감. 단일 writer라 자가치유·안전. */
function _syncBizPub(){
  if(!IS_TEACHER) return;
  window._bizPubHash = window._bizPubHash || {};
  const biz = obj(DB.businesses), pub = obj(DB.bizPub);
  const upd = {};
  entries(biz).forEach(([cd,b])=>{
    b = obj(b);
    const bg = obj(b.budget);
    const slim = { name:b.name||'', status:b.status||'', bonus:b.bonus||'', ins4:b.ins4||'', condition:b.condition||'', ceo:b.ceo||'' };
    // 사업계획서 본문(desc·plan·budget)은 채용공고가 뜨는 '승인' 회사만 미러에 포함
    //  → 0일차 초안 저장 churn으로 인한 bizPub 전체노드 재다운로드(egress 폭증) 방지.
    if(b.status==='approved'){
      slim.desc=b.desc||''; slim.plan=b.plan||''; slim.items=bg.items||''; slim.itemsTchr=bg.itemsTchr||'';
      slim.cost=(bg.cost!=null?bg.cost:''); slim.cookie=(bg.cookie!=null?bg.cookie:'');
      // 모집 필드도 미러에 포함 → 채용공고를 단일 출처(businesses)에서 읽어 교사 수정이 항상 반영.
      slim.duty=b.duty||''; slim.headcount=(b.headcount!=null?b.headcount:''); slim.workDays=(b.workDays!=null?b.workDays:'');
      slim.qualification=b.qualification||''; slim.weeklyPay=(b.weeklyPay!=null?b.weeklyPay:'');
    }
    const h = JSON.stringify(slim);
    if(window._bizPubHash[cd] !== h){ upd['bizPub/'+cd] = slim; window._bizPubHash[cd] = h; }
  });
  Object.keys(pub).forEach(cd=>{ if(!biz[cd]){ upd['bizPub/'+cd] = null; delete window._bizPubHash[cd]; } });   // 삭제된 회사 미러 정리
  if(Object.keys(upd).length){ S.update(upd).catch(()=>{}); }
}
/* 승인된 회사마다 키오스크 부스(kiosk_booths/sb_<사장코드>) 자동 생성 — 없을 때만. ownerCd로 키오스크 월급지급과도 연동 */
function _ensureBooths(){
  if(!IS_TEACHER || !window._kioskBoothsLoaded || phase()<2) return;   // 부스는 3일차 사용 → 그 전엔 생성/순회 생략(쓰기·CPU 절감, 필요 시 openBooth가 즉석 생성)
  const biz = obj(DB.businesses);
  const existing = window._kioskBooths || {};
  const upd = {};
  entries(biz).forEach(([cd,b])=>{
    if(b.status!=='approved') return;
    if(b.boothId || existing[boothIdFor(cd)]) return;   // 이미 생성됨(키오스크에서 삭제해도 재생성 안 함)
    const id = boothIdFor(cd);
    upd['kiosk_booths/'+id] = { id, name:(b.name||(nmeOf(cd)+'의 가게')), group:'', icon:'🏪', color:'#FFE0B2', ownerCd:cd, open:true, createdAt:Date.now() };
    upd['ClassData/Startup/businesses/'+cd+'/boothId'] = id;   // 생성 표시(재생성 방지)
  });
  if(Object.keys(upd).length){ try{ DBROOT.update(upd); }catch(_){} }
}
function _pubEligible(cd){ const sel=obj(obj(DB.selections)[cd]); return !sel.published && (Object.keys(obj(sel.hired)).length>0 || Object.keys(obj(sel.reserve)).length>0); }
function publishAll(){
  const biz = obj(DB.businesses);
  const targets = entries(biz).filter(([cd,b])=> b.status==='approved' && _pubEligible(cd));
  if(!targets.length){ toast('발표할 회사가 없어요.'); return; }
  prettyConfirm('일괄 합격 발표', '<b>'+targets.length+'개 회사</b>의 합격자를 한 번에 발표할까요?<br>발표 후 지원자에게 실명이 공개됩니다.', ()=>{
    const upd={}, allHired={};
    targets.forEach(([cd])=>{
      const hired = Object.assign({}, obj(obj(obj(DB.selections)[cd]).hired));
      _fillFromReserve(cd, hired, upd);   // 선발 0명·정원 미달이면 후보 승격
      upd['selections/'+cd+'/published']=true; upd['selections/'+cd+'/publishedAt']=TS;
      allHired[cd]=hired;
    });
    S.update(upd).then(()=>{
      Object.entries(allHired).forEach(([cd,hired])=> Object.entries(hired).forEach(([acd,info])=> createOffer(cd, acd, info.offerPay||0)));
      toast('일괄 발표 완료! 📣');
    }).catch(()=>toast('발표 실패 — 다시 시도해 주세요'));
  }, '📣');
}
// 2일차 진입 시 자동 일괄 발표(교사 클라이언트 전용, 확인창 없음, 멱등)
function _autoPublishAll(){
  if(!IS_TEACHER || phase()<2 || window._autoPubBusy) return;
  const biz = obj(DB.businesses);
  const targets = entries(biz).filter(([cd,b])=> b.status==='approved' && _pubEligible(cd));
  if(!targets.length) return;
  window._autoPubBusy = true;
  const upd = {}, allHired = {};
  targets.forEach(([cd])=>{
    const hired = Object.assign({}, obj(obj(obj(DB.selections)[cd]).hired));
    _fillFromReserve(cd, hired, upd);   // 선발 0명·정원 미달이면 후보 승격
    upd['selections/'+cd+'/published']=true; upd['selections/'+cd+'/publishedAt']=TS;
    allHired[cd]=hired;
  });
  S.update(upd).then(()=>{ window._autoPubBusy=false; Object.entries(allHired).forEach(([cd,hired])=> Object.entries(hired).forEach(([acd,info])=> createOffer(cd, acd, info.offerPay||0))); toast(targets.length+'개 회사 자동 합격 발표 📣'); }).catch(()=>{ window._autoPubBusy=false; });
}
function promoteReserve(cd, acd, wantPay){
  const quota = (obj(obj(DB.jobPosts)[cd]).headcount)||1;
  const ref = S.child('selections/'+cd+'/hired');
  ref.transaction(cur=>{
    cur = cur||{};
    if(cur[acd]) return cur;
    if(Object.keys(cur).length>=quota) return; // 정원 초과
    cur[acd] = { offerPay: wantPay||0, at: Date.now() };
    return cur;
  }, (err,committed)=>{
    if(err) return toast('오류');
    if(!committed) return toast('정원이 찼어요. 거절/취소 후 다시 시도하세요.');
    S.child('selections/'+cd+'/reserve/'+acd).remove();
    createOffer(cd, acd, wantPay||0);
    toast('추가 채용 통지 전송');
  });
}

/* 합격 통지 생성 (멱등) */
function createOffer(bizCd, acd, offerPay){
  S.child('offers/'+acd+'/'+bizCd).transaction(cur=>{
    if(cur) return cur;                 // 이미 통지됨
    return {status:'pending', offerPay:offerPay||0, createdAt:Date.now()};
  });
}

/* ============================================================
   사업가 면접 채점 (익명)
   - 항목은 인덱스 키(i0,i1..)로 저장 → 채점 시작 전 항목 확정 권장
============================================================ */
const IPRESET = ['아이디어','합리적 예산','구체적인 계획','기타(성실함, 리더십 등)'];
function iCfg(){ return obj(obj(DB.interview).config); }
// 교사가 항목을 설정하지 않았으면 기본 4항목(IPRESET)이 항상 선택된 것으로 취급
function iItems(){ const it=(iCfg().items||[]); return it.length ? it : IPRESET.slice(); }
// 교사가 정한 회사 순서(interview/config/order = [cd,...]). 학생은 config를 이미 구독하므로 추가 트래픽 없음.
function iOrder(){ const o=iCfg().order; return Array.isArray(o)?o:[]; }
function iOrderedApproved(excludeCd){
  const targets = entries(DB.businesses).filter(([cd,b])=> b.status==='approved' && cd!==excludeCd);
  const ord = iOrder();
  const pos = cd => { const i=ord.indexOf(cd); return i<0 ? 1e9 : i; };   // 순서 미지정 회사는 뒤로
  return targets.sort((a,b)=>{ const d=pos(a[0])-pos(b[0]); return d!==0 ? d : String(a[1].name||'').localeCompare(String(b[1].name||'')); });
}
function saveIOrder(order){ S.child('interview/config/order').set(order); }
// 회사의 면접 채점 총합(항목별 평균의 합) — 회사 현황 정렬에 사용
function iTotalOf(cd){
  const scores = obj(obj(DB.interview).scores);
  let total=0;
  iItems().forEach((_,idx)=>{
    let sum=0,n=0;
    Object.values(scores).forEach(byTarget=>{ const v=obj(obj(byTarget)[cd])['i'+idx]; if(typeof v==='number'){ sum+=v; n++; } });
    if(n) total += sum/n;
  });
  return total;
}

/* ---- 교사: 설정 ---- */
function interviewSetupCard(){
  const cfg = iCfg();
  const items = iItems();
  const max = cfg.max || 5;
  let h = '<div class="card"><h2>🎤 사업가 면접 채점 — 설정</h2>';
  h += '<p class="muted">평가항목을 고르면 <b>1일차</b>에 학생들에게 채점표가 <b>자동으로 표시</b>됩니다(사업가는 제외). 필요하면 마감을 눌러 숨길 수 있어요. <b>항목은 미리 확정하세요.</b></p>';
  h += '<div class="field"><label>평가항목 (클릭해서 선택/해제)</label><div class="row">';
  IPRESET.forEach(p=>{ const on=items.includes(p); h += `<button class="btn-sm ${on?'btn-grn':'btn-gray'}" onclick="toggleIItem('${p}')">${on?'✔ ':''}${esc(p)}</button>`; });
  h += '</div></div>';
  const customs = items.filter(x=>!IPRESET.includes(x));
  if(customs.length){ h += '<div class="row" style="margin-bottom:8px">'+customs.map((c,i)=>`<span class="badge b-ok">${esc(c)} <a onclick="removeIItem(${items.indexOf(c)})" style="cursor:pointer">✕</a></span>`).join(' ')+'</div>'; }
  h += '<div class="row"><input id="iCustom" placeholder="직접 추가할 항목" style="max-width:200px" onkeyup="if(event.key===\'Enter\')addIItem()"><button class="btn-gray btn-sm" onclick="addIItem()">+ 추가</button>';
  h += `<label style="margin-left:8px;font-size:13px">항목별 만점 <input id="iMax" type="number" min="1" max="10" value="${max}" style="width:60px;display:inline-block" onchange="saveIMax()"></label></div>`;
  const isOpen = cfg.open!==false;   // 기본 표시, 명시적으로 마감(false)했을 때만 숨김
  h += '<div class="divider"></div><div class="row">';
  h += `<button class="${isOpen?'btn-red':'btn-grn'}" onclick="toggleIOpen(${!isOpen})">${isOpen?'🔒 채점 마감(자동 제출)':'▶ 채점 다시 열기'}</button>`;
  h += `<span class="badge ${isOpen?'b-ok':'b-wait'}">${isOpen?'학생에게 표시중':'숨김'}</span>`;
  h += '<button class="btn-gray btn-sm" onclick="resetInterview()">채점 기록 초기화</button></div></div>';
  return h;
}
function toggleIItem(p){ let items=iItems().slice(); items = items.includes(p) ? items.filter(x=>x!==p) : items.concat([p]); S.child('interview/config/items').set(items); }
function removeIItem(idx){ let items=iItems().slice(); items.splice(idx,1); S.child('interview/config/items').set(items); }
function addIItem(){ const v=($('iCustom').value||'').trim(); if(!v)return; let items=iItems().slice(); if(!items.includes(v)) items.push(v); S.child('interview/config/items').set(items); $('iCustom').value=''; }
function saveIMax(){ const m=parseInt($('iMax').value)||5; S.child('interview/config/max').set(Math.max(1,Math.min(10,m))); }
function toggleIOpen(v){
  if(!v){   // 마감 → 학생들의 미제출 점수가 자동 제출됨을 안내
    prettyConfirm('채점 마감', '채점을 마감하면 학생들이 <b>지금까지 준 점수가 자동으로 제출</b>되고, 더 이상 수정할 수 없어요.<br>마감할까요?', ()=>{ S.child('interview/config/open').set(false); toast('채점을 마감했어요 — 학생 점수 자동 제출'); }, '🔒');
    return;
  }
  S.child('interview/config/open').set(true); toast('채점을 시작했어요');
}
function resetInterview(){ if(!confirm('면접 채점 기록을 모두 삭제할까요?'))return; S.child('interview/scores').remove(); toast('채점 기록 초기화'); }

/* ---- 교사: 결과 채점표 ---- */
function interviewResultCard(){
  const cfg = iCfg(); const items = iItems();
  const targets = iOrderedApproved();
  let h = '<div class="card"><h2>📊 면접 채점표 (평균)</h2>';
  if(!items.length){ h += '<div class="empty">평가항목을 먼저 설정하세요.</div></div>'; return h; }
  if(!targets.length){ h += '<div class="empty">승인된 사업가가 없습니다.</div></div>'; return h; }
  // 회사(열) 순서 드래그 재정렬 — 학생 평가표에도 동일 순서로 반영
  h += '<div class="muted" style="margin-bottom:4px">↕ 회사 이름을 <b>드래그</b>하면 채점표의 열 순서를 바꿀 수 있어요 (학생 평가표에도 반영).</div>';
  h += '<div class="ord-wrap" id="ordWrap">';
  targets.forEach(([cd,b])=>{ h += `<div class="ord-row" data-cd="${cd}" onpointerdown="ordDown(event,'${cd}')"><span class="ord-grip">☰</span><span>${esc(b.name||nmeOf(cd))} <span class="muted" style="font-weight:600">${esc(nmeOf(cd))}</span></span></div>`; });
  h += '</div>';
  const scores = obj(obj(DB.interview).scores);
  const totals = {};
  const cell='border:1px solid #ddd;padding:6px;text-align:center';
  h += '<div class="hscroll" data-hskey="result"><table style="border-collapse:collapse;width:100%;font-size:13px">';
  h += '<tr><th style="'+cell+';background:#f7f7f7;text-align:left">평가항목 ＼ 지원자</th>';
  targets.forEach(([cd,b])=> h += `<th style="${cell};background:#f7f7f7">${esc(b.name||nmeOf(cd))}<br><span class="muted">${esc(nmeOf(cd))}</span></th>`);
  h += '</tr>';
  items.forEach((it,idx)=>{
    h += `<tr><td style="${cell};text-align:left;font-weight:700">${esc(it)}</td>`;
    targets.forEach(([tcd])=>{
      let sum=0,n=0;
      Object.values(scores).forEach(byTarget=>{ const v=obj(obj(byTarget)[tcd])['i'+idx]; if(typeof v==='number'){sum+=v;n++;} });
      const avg = n?(sum/n):0; totals[tcd]=(totals[tcd]||0)+avg;
      h += `<td style="${cell}">${n?avg.toFixed(1):'-'}</td>`;
    });
    h += '</tr>';
  });
  let best=-1,bestCd=null;
  targets.forEach(([tcd])=>{ const t=totals[tcd]||0; if(t>best){best=t;bestCd=tcd;} });
  h += `<tr><td style="${cell};text-align:left;font-weight:800;background:#fff7ee">총 합</td>`;
  targets.forEach(([tcd])=>{ const t=totals[tcd]||0; h += `<td style="${cell};font-weight:800;background:#fff7ee">${t.toFixed(1)}${(tcd===bestCd&&best>0)?' 🏆':''}</td>`; });
  h += '</tr></table></div>';
  h += `<p class="muted" style="margin-top:8px">채점 참여 ${Object.keys(scores).length}명 · 셀 값은 평균 점수입니다.</p>`;
  // 아직 채점 안 한 학생 이름(사장 제외) — 참여 독려용
  const notVoted = Object.keys(ROSTER)
    .filter(cd => !obj(scores[cd]) || !Object.keys(obj(scores[cd])).length)   // 제출 기록 없음
    .filter(cd => stuRole(cd)!=='boss')                                       // 사장(평가 대상)은 제외
    .sort((a,b)=> ((ROSTER[a].no||9999)-(ROSTER[b].no||9999)) || String(ROSTER[a].nm||'').localeCompare(String(ROSTER[b].nm||'')));
  if(notVoted.length) h += `<p class="muted" style="color:#c0392b">🙅 아직 채점 안 함 (${notVoted.length}명): ${notVoted.map(cd=>esc(nmeOf(cd))).join(', ')}</p>`;
  h += '</div>';
