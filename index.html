/* 교사: 회사 순서 포인터 드래그(터치/마우스 공용, 태블릿 동작)
   포인터 캡처가 실패해도 끊기지 않도록 document 레벨에서 move/up을 듣는다. */
function ordDown(e, cd){
  e.preventDefault(); e.stopPropagation();
  const row=e.currentTarget, list=row.parentNode;
  window._ordDrag={ row, list };
  window._ordDragging=true;
  try{ row.setPointerCapture(e.pointerId); }catch(_){}
  row.classList.add('ord-dragging');
  document.addEventListener('pointermove', ordMove);
  document.addEventListener('pointerup', ordUp);
  document.addEventListener('pointercancel', ordUp);
}
function ordMove(e){
  const d=window._ordDrag; if(!d) return;
  e.preventDefault();
  const y=e.clientY;
  const others=Array.from(d.list.querySelectorAll('.ord-row')).filter(r=>r!==d.row);
  let placed=false;
  for(const r of others){ const rc=r.getBoundingClientRect(); if(y < rc.top+rc.height/2){ d.list.insertBefore(d.row, r); placed=true; break; } }
  if(!placed) d.list.appendChild(d.row);
}
function ordUp(){
  const d=window._ordDrag; if(!d) return;
  document.removeEventListener('pointermove', ordMove);
  document.removeEventListener('pointerup', ordUp);
  document.removeEventListener('pointercancel', ordUp);
  d.row.classList.remove('ord-dragging');
  window._ordDrag=null; window._ordDragging=false;
  const order=Array.from(d.list.querySelectorAll('.ord-row')).map(r=>r.dataset.cd);
  saveIOrder(order);   // DB 저장 → 재렌더로 표·학생 평가표 순서 반영
}

/* ---- 학생: 면접 채점표 (표 + 별점, 로컬 보관 → 마지막에 제출) ---- */
function _iScoresKey(){ return 'startup_iscores_'+(ME&&ME.cd); }
function getLocalScores(){ if(!window._localScores){ try{ window._localScores=JSON.parse(localStorage.getItem(_iScoresKey())||'{}')||{}; }catch(_){ window._localScores={}; } } return window._localScores; }
function _saveLocalScores(){ try{ localStorage.setItem(_iScoresKey(), JSON.stringify(getLocalScores())); }catch(_){} }
function localScoreOf(tcd, idx){ const t=getLocalScores()[tcd]||{}; return t['i'+idx]||0; }
function setLocalScore(tcd, idx, n){ const ls=getLocalScores(); ls[tcd]=ls[tcd]||{}; if(n>0) ls[tcd]['i'+idx]=n; else delete ls[tcd]['i'+idx]; _saveLocalScores(); }
function interviewScoreCard(voterCd){
  if(phase()!==1) return '';        // 면접 채점은 1일차
  const cfg = iCfg();
  if(cfg.open===false){
    // 교사가 '마감' → 아직 제출 안 한 로컬 점수를 자동 제출 처리(토스트로만 알림) 후 카드는 숨김
    const submitted = Object.keys(obj(obj(obj(DB.interview).scores)[voterCd])).length>0;
    const local = getLocalScores();
    if(!submitted && Object.keys(local).length && !window._iAutoSubmitBusy){
      window._iAutoSubmitBusy = true;
      S.child('interview/scores/'+ME.cd).set(local)
        .then(()=>{ window._iAutoSubmitBusy=false; toast('채점이 마감되어 자동 제출됐어요 📨'); scheduleRender(); })
        .catch(()=>{ window._iAutoSubmitBusy=false; });
    }
    return '';   // 마감 시 학생 화면에서는 평가표 칸 자체를 숨김
  }
  const items = iItems(); const max = cfg.max || 5;
  const targets = iOrderedApproved(voterCd);
  // 로컬이 비어있고 서버에 제출본이 있으면 1회 시드(새로고침/다른 기기 복원)
  if(Object.keys(getLocalScores()).length===0){ const srv=obj(obj(obj(DB.interview).scores)[voterCd]); if(Object.keys(srv).length){ window._localScores=JSON.parse(JSON.stringify(srv)); _saveLocalScores(); } }
  const locked = Object.keys(obj(obj(obj(DB.interview).scores)[voterCd])).length>0;   // 제출하면 잠김(수정 불가)
  let h = '<div class="card"><h2>🎤 사업가 평가표</h2>';
  if(locked) h += '<p class="muted">✅ 이미 제출했어요. <b>점수는 수정할 수 없어요.</b></p>';
  if(!targets.length){ h += '<div class="empty">채점할 사업가가 없어요.</div></div>'; return h; }
  h += '<div class="hscroll" data-hskey="score"><table class="score-table"><tr><th class="corner">평가항목 ＼ 지원자</th>';
  targets.forEach(([tcd,b])=>{ h += `<th>${esc(b.name||nmeOf(tcd))}</th>`; });
  h += '</tr>';
  items.forEach((it,idx)=>{
    h += `<tr><td class="it">${esc(it)}</td>`;
    targets.forEach(([tcd])=>{
      const cur = localScoreOf(tcd, idx);
      const pd = locked ? '' : `onpointerdown="starDown(event,'${tcd}',${idx})"`;
      h += `<td><div class="stars${locked?' locked':''}" data-max="${max}" ${pd}>`;
      for(let s=0;s<max;s++){ const frac=Math.max(0,Math.min(1,cur-s)); h += `<span class="star">☆<span class="fill" style="width:${frac*100}%">★</span></span>`; }
      h += '</div></td>';
    });
    h += '</tr>';
  });
  const sums = targets.map(([tcd])=>{ let s=0; items.forEach((_,idx)=>{ s+=localScoreOf(tcd,idx); }); return s; });
  const maxSum = Math.max(0, ...sums);
  h += '<tr><td class="it">총합</td>';
  sums.forEach(s=>{ const top=s>0&&s===maxSum; h += `<td class="sumcell${top?' top':''}">${Number.isInteger(s)?s:s.toFixed(1)}${top?' 🏆':''}</td>`; });
  h += '</tr></table></div>';
  if(locked) h += '<div class="row" style="margin-top:6px"><button class="btn-gray" disabled>✅ 제출됨</button></div>';
  else h += '<div class="row" style="margin-top:6px"><button class="btn-org" onclick="submitScores()">📨 제출하기</button></div>';
  h += '</div>';
  return h;
}
function submitScores(){
  prettyConfirm('면접 점수 제출', '지금까지 준 별점을 <b>제출</b>할까요?<br><b style="color:#c0392b">제출하면 수정할 수 없어요.</b>', ()=>{
    S.child('interview/scores/'+ME.cd).set(getLocalScores()).then(()=>toast('제출 완료! 📨')).catch(()=>toast('제출 실패'));
  }, '📨');
}

/* 별점 위젯: 클릭=한 칸 토글 (로컬 저장, 제출 전엔 서버 write 없음) */
function _starRatio(c, clientX){ const r=c.getBoundingClientRect(); let x=r.width?(clientX-r.left)/r.width:0; return Math.max(0,Math.min(1,x)); }
function _paintStars(c, value){ c.querySelectorAll('.star').forEach((slot,i)=>{ const frac=Math.max(0,Math.min(1,value-i)); const f=slot.querySelector('.fill'); if(f) f.style.width=(frac*100)+'%'; }); }
function starDown(e, tcd, idx){
  const c=e.currentTarget, max=parseInt(c.dataset.max)||5, cur=localScoreOf(tcd,idx);
  window._starDrag={ tcd, idx, c, max, cur, moved:false, val:cur };
  window._starDragging=true;
  // 마우스만 드래그-채점(포인터 캡처). 터치/펜은 캡처하지 않아 브라우저가 가로 스크롤을 처리 → 태블릿 스크롤 정상.
  if(e.pointerType==='mouse'){ e.preventDefault(); try{ c.setPointerCapture(e.pointerId); }catch(_){} }
  c.onpointermove=starMove; c.onpointerup=starUp; c.onpointercancel=starCancel;
}
/* 스크롤(팬)로 인식되어 취소되면 값 변경 없이 원상복구 */
function starCancel(){
  const d=window._starDrag; if(!d) return;
  window._starDrag=null; window._starDragging=false;
  try{ d.c.onpointermove=null; d.c.onpointerup=null; d.c.onpointercancel=null; }catch(_){}
  _paintStars(d.c, d.cur);
}
function starMove(e){
  const d=window._starDrag; if(!d) return;
  const v=Math.round(_starRatio(d.c, e.clientX)*d.max);   // 1개(정수) 단위
  d.moved=true; d.val=v; _paintStars(d.c, v);
}
function starUp(e){
  const d=window._starDrag; if(!d) return;
  let v;
  if(d.moved){ v=d.val; }
  else { const s=Math.min(d.max, Math.max(1, Math.ceil(_starRatio(d.c, e.clientX)*d.max))); v=(d.cur===s)? s-1 : s; }
  window._starDrag=null; window._starDragging=false;
  try{ d.c.onpointermove=null; d.c.onpointerup=null; d.c.onpointercancel=null; }catch(_){}
  _paintStars(d.c, v);
  setLocalScore(d.tcd, d.idx, v);   // 로컬만 저장
  scheduleRender();                  // 총합 갱신(트래픽 없음)
}

/* ---- 면접 질문 제출 (익명). 학생은 questions 전체를 구독하지 않고 내 질문만 로컬 보관 ---- */
function _myqKey(){ return 'startup_myq_'+(ME&&ME.cd); }
function getMyQ(){ try{ return JSON.parse(localStorage.getItem(_myqKey())||'{}')||{}; }catch(_){ return {}; } }
function saveMyQ(m){ try{ localStorage.setItem(_myqKey(), JSON.stringify(m)); }catch(_){} }
function interviewQuestionsCard(isTeacher){
  const qs = entries(DB.interview && DB.interview.questions).sort((a,b)=>(a[1].at||0)-(b[1].at||0));
  const targets = entries(DB.businesses).filter(([cd,b])=>b.status==='approved');
  if(!isTeacher && phase()!==1) return '';   // 면접 질문은 1일차에만 (2일차부터 숨김)
  if(!isTeacher && iCfg().open===false) return '';   // 교사가 채점을 마감하면 학생 질문 카드도 함께 숨김
  if(!isTeacher && !targets.length) return '';
  const tgtName = q => q.targetCd ? (obj(obj(DB.businesses)[q.targetCd]).name || nmeOf(q.targetCd)) : '전체';
  let h = '<div class="card"><h2>🎤 사업가에게 질문하기</h2>';

  if(isTeacher){
    h += '<p class="muted">학생들이 낸 질문입니다(선생님에게는 <b>작성자 이름</b>이 보여요). 면접 때 읽어주세요. 부적절한 질문은 삭제할 수 있어요.</p>';
    if(!qs.length) h += '<div class="empty">아직 제출된 질문이 없어요.</div>';
    qs.forEach(([id,q])=>{
      h += `<div class="list-item"><div class="row" style="justify-content:space-between;flex-wrap:nowrap;gap:8px"><span><span class="badge b-ok">🙋 ${esc(nmeOf(q.byCd))}</span> <span class="badge b-info">${esc(tgtName(q))}</span> ${esc(q.text)}</span><button class="btn-red btn-sm" onclick="delQuestion('${id}')">삭제</button></div></div>`;
    });
    h += '</div>';
    return h;
  }

  // 학생·사장: 질문 작성 (남의 질문은 안 받음 — 내 질문만 로컬 보관)
  const myq = getMyQ();
  const editId = window._editQid && myq[window._editQid] ? window._editQid : null;
  const editQ = editId ? myq[editId] : null;
  if(editId) h += '<p class="muted"><b style="color:#c46a12">(수정 중)</b></p>';
  h += '<div class="field"><label>질문 대상</label><select id="qTarget"><option value="" '+(editQ&&!editQ.targetCd?'selected':'')+'>전체 사업가</option>';
  targets.forEach(([cd,b])=>{ if(cd!==ME.cd) h += `<option value="${cd}" ${editQ&&editQ.targetCd===cd?'selected':''}>${esc(b.name||nmeOf(cd))}</option>`; });
  h += '</select></div>';
  h += '<div class="field"><textarea id="qText" placeholder="질문을 적어주세요">'+(editQ?esc(editQ.text||''):'')+'</textarea></div>';
  if(editId) h += '<div class="row"><button class="btn-gray btn-sm" onclick="cancelEditQuestion()">취소</button><button class="btn-org btn-sm" onclick="submitQuestion()">✏️ 수정 완료</button></div>';
  else h += '<button class="btn-org btn-sm" onclick="submitQuestion()">📨 질문 제출</button>';
  // 내가 낸 질문만 표시 + 수정/삭제
  const mine = Object.entries(myq).sort((a,b)=>(b[1].at||0)-(a[1].at||0));
  if(mine.length){
    h += '<div class="divider"></div><div class="muted" style="margin-bottom:6px">내가 낸 질문 ('+mine.length+')</div>';
    mine.forEach(([id,q])=>{
      const tn = q.targetCd ? (obj(obj(DB.businesses)[q.targetCd]).name || nmeOf(q.targetCd)) : '전체';
      h += `<div class="list-item"><div class="row" style="justify-content:space-between;flex-wrap:nowrap;gap:8px"><span><span class="badge b-info">${esc(tn)}</span> ${esc(q.text)}</span><span class="row"><button class="btn-gray btn-sm" onclick="editQuestion('${id}')">수정</button><button class="btn-gray btn-sm" onclick="delQuestion('${id}')">삭제</button></span></div></div>`;
    });
  }
  h += '</div>';
  return h;
}
function editQuestion(id){ window._editQid = id; render(); const t=$('qText'); if(t){ t.focus(); try{ t.setSelectionRange(t.value.length,t.value.length); }catch(_){} } }
function cancelEditQuestion(){ window._editQid = null; render(); }
function submitQuestion(){
  const text = ($('qText').value||'').trim();
  if(!text){ toast('질문을 적어주세요.'); return; }
  const target = ($('qTarget') ? $('qTarget').value : '') || '';
  const m = getMyQ();
  if(window._editQid && m[window._editQid]){
    const id = window._editQid; window._editQid = null;
    S.child('interview/questions/'+id).update({ text, targetCd:target });   // 서버 질문 수정
    m[id] = { text, targetCd:target, at:(m[id].at||Date.now()) }; saveMyQ(m);
    toast('질문을 수정했어요');
  } else {
    const ref = S.child('interview/questions').push({ text, targetCd:target, byCd:ME.cd, at:TS });
    m[ref.key] = { text, targetCd:target, at:Date.now() }; saveMyQ(m);
    toast('질문을 제출했어요! 📨');
  }
  render();
}
function delQuestion(id){ S.child('interview/questions/'+id).remove(); const m=getMyQ(); if(m[id]){ delete m[id]; saveMyQ(m); } if(window._editQid===id) window._editQid=null; if(!IS_TEACHER) render(); }

/* ---- 공무원 신청 ---- */
function civilCard(c){
  c = obj(c); const st = c.status;
  let h = '<div class="card"><h2>🏛️ 공무원 신청 ';
  h += st==='approved' ? '<span class="badge b-ok">임용됨</span>' : st==='rejected' ? '<span class="badge b-no">반려됨</span>' : '<span class="badge b-wait">심사중</span>';
  h += '</h2>';
  if(st==='approved'){ clearDraftLocal('civil'); h += '<div class="badge b-ok">축하해요! 공무원으로 임용되었어요.</div></div>'; return h; }
  const editable = st!=='submitted';
  if(!editable) clearDraftLocal('civil');
  const d = editable ? (getDraftLocal('civil')||{}) : {};
  const pick = (k, fb)=> (d[k]!==undefined ? d[k] : fb);
  const dis = editable ? '' : 'disabled';
  const oi = editable ? 'oninput="autosaveCivil()"' : '';
  h += `<div class="field"><label>지원 동기 (왜 공무원이 되고 싶나요?)</label><textarea id="cs_motive" ${oi} ${dis}>${esc(pick('motive', c.motive||''))}</textarea></div>`;
  h += `<div class="field"><label>당신의 장점은 무엇입니까? (꼼꼼함·책임감·경력 등)</label><textarea id="cs_strength" ${oi} ${dis}>${esc(pick('strength', c.strength||''))}</textarea></div>`;
  h += `<div class="field"><label>당신의 단점은 무엇이며 어떻게 극복할 것입니까?</label><textarea id="cs_weakness" ${oi} ${dis}>${esc(pick('weakness', c.weakness||''))}</textarea></div>`;
  h += `<div class="field"><label>다짐 및 각오</label><textarea id="cs_resolve" ${oi} ${dis}>${esc(pick('resolve', c.resolve||''))}</textarea></div>`;
  if(st!=='submitted') h += '<div class="row"><button class="btn-gray btn-sm" onclick="cancelCivilDraft()">그만두기</button><button class="btn-gray btn-sm" onclick="saveCivil(false)">임시 저장</button><button class="btn-grn" onclick="saveCivil(true)">📨 신청하기</button></div>';
  else h += '<div class="empty">✅ 신청 완료! 선생님 심사를 기다리는 중이에요.<br><span class="muted">제출한 신청서는 수정·취소할 수 없어요.</span></div>';
  h += '</div>';
  return h;
}

/* 합격 통지 — 중복합격 선택 */

    h += '<div class="card"><h2>🎉 채용 확정'+(acceptedList.length>1?' <span class="badge b-ok">'+acceptedList.length+'곳 겸직</span>':'')+'</h2>';
    acceptedList.forEach(([bc,o])=>{
      const cname = obj(obj(DB.businesses)[bc]).name || (nmeOf(bc)+'의 가게');

    });
    h += '</div>';
    acceptedList.forEach(([bc])=>{ h += boothLinkCard(bc, '상점'); });   // 3일차: 배정된 상점(부스) 이동
  }
  if(pending.length){
    const canMulti = acceptedList.length>0;   // 이미 취업 → 새 통지는 겸직 수락
    h += '<div class="card"><h2>📣 합격 통지 <span class="badge b-ok">'+pending.length+'</span></h2>';
    if(canMulti) h += '<p class="muted">이미 근무 중이에요. 추가 채용에 <b>겸직</b>으로 입사할 수 있어요.</p>';
    else if(pending.length>1) h += '<p class="muted">여러 곳에 합격했어요! <b>한 곳만</b> 선택할 수 있습니다.</p>';
    pending.forEach(([bc,o])=>{
      const cname = obj(obj(DB.businesses)[bc]).name || (nmeOf(bc)+'의 가게');
      const multi = canMulti || !!o.rehire;   // 겸직 수락 경로(잠금·자동거절 없음)
      h += '<div class="list-item"><div class="biz-head">';
      h += `<b>🏪 ${esc(cname)}</b><span class="muted">사장 ${esc(nmeOf(bc))} · 총 ${esc(o.offerPay||0)}쿠키${multi?' · 겸직':''}</span></div>`;
      h += `<div class="row" style="margin-top:6px"><button class="btn-grn btn-sm" onclick="${multi?'confirmAcceptRehire':'confirmAccept'}('${bc}')">수락</button><button class="btn-gray btn-sm" onclick="declineOffer('${bc}')">거절</button></div>`;
      h += '</div>';
    });
    h += '</div>';
  }
  return h;
}
/* 겸직 수락 확인창 — 기존 직장 유지, 자동 거절 없음 */
function confirmAcceptRehire(bizCd){
  const cname = obj(obj(DB.businesses)[bizCd]).name || (nmeOf(bizCd)+'의 가게');
  prettyConfirm('겸직 입사 수락', '🏪 <b>'+esc(cname)+'</b> 에 <b>겸직</b>으로 입사할까요?<br><span class="muted">기존 직장은 그대로 두고 이 회사에도 함께 근무해요. 수락하면 취소할 수 없어요.</span>', ()=>acceptRehireOffer(bizCd), '🎉');
}
/* 겸직 수락: acceptedLock을 막지 않음(첫 취업이면 잠금, 아니면 유지). 다른 통지 자동 거절 안 함 */
function acceptRehireOffer(bizCd){
  const acd = ME.cd;
  S.child('offers/'+acd+'/'+bizCd+'/status').transaction(st=> (st==='pending'||st==='accepted') ? 'accepted' : undefined,
    (e,committed)=>{
      if(e) return toast('오류가 발생했어요');
      if(!committed) return toast('통지 상태가 변경되어 처리하지 못했어요.');
      const offerPay = (obj(obj(obj(DB.offers)[acd])[bizCd]).offerPay)||0;
      const upd = {};
      upd['offers/'+acd+'/'+bizCd+'/decidedAt'] = TS;
      upd['hires/'+bizCd+'/'+acd] = {weeklyPay:offerPay, confirmedAt:TS};
      S.update(upd);
      S.child('acceptedLock/'+acd).transaction(cur=> cur || bizCd);   // 첫 취업이면 잠금, 겸직이면 기존 유지
      toast('입사 확정! 🎉');
    });
}

/* 수락 전 예쁜 확인창 — 수락은 한 곳만, 취소 불가 안내 */
function confirmAccept(bizCd){
  const cname = obj(obj(DB.businesses)[bizCd]).name || (nmeOf(bizCd)+'의 가게');
  prettyConfirm('입사 수락', '🏪 <b>'+esc(cname)+'</b> 에 입사할까요?<br><b style="color:#c0392b">수락하면 취소할 수 없고</b>, 다른 회사 합격은 자동으로 거절돼요. (한 곳만 입사 가능)', ()=>acceptOffer(bizCd), '🎉');
}

/* 수락: acceptedLock 전역 잠금 → offer accepted → 나머지 자동 거절 */
function acceptOffer(bizCd){
  const acd = ME.cd;
  S.child('acceptedLock/'+acd).transaction(cur=>{
    if(cur && cur!==bizCd) return;   // 이미 다른 곳 확정 → abort
    return bizCd;
  }, (err,committed,snap)=>{
    if(err) return toast('오류가 발생했어요');
    if(!committed){ toast('이미 다른 곳에 입사했어요.'); return; }
    // offer 확정
    S.child('offers/'+acd+'/'+bizCd+'/status').transaction(st=> st==='pending'||st==='accepted' ? 'accepted' : undefined,
      (e2,c2)=>{
        if(!c2){ // 통지가 사라졌거나 상태 이상 → 잠금 해제
          S.child('acceptedLock/'+acd).remove();
          return toast('통지 상태가 변경되어 처리하지 못했어요.');
        }
        S.child('offers/'+acd+'/'+bizCd).update({decidedAt:TS});
        S.child('hires/'+bizCd+'/'+acd).set({weeklyPay:(obj(obj(obj(DB.offers)[acd])[bizCd]).offerPay)||0, confirmedAt:TS});
        // 나머지 pending offer 자동 거절
        entries(obj(DB.offers)[acd]).forEach(([bc,o])=>{
          if(bc!==bizCd && o.status==='pending'){
            S.child('offers/'+acd+'/'+bc+'/status').set('declined');
            S.child('offers/'+acd+'/'+bc+'/decidedAt').set(TS);
          }
        });
        toast('입사 확정! 🎉');
      });
  });
}
function declineOffer(bizCd){
  if(!confirm('이 회사의 합격을 거절할까요?'))return;
  const acd = ME.cd;
  S.child('offers/'+acd+'/'+bizCd+'/status').transaction(st=> st==='pending' ? 'declined' : undefined,
    (e,c)=>{ if(c){ S.child('offers/'+acd+'/'+bizCd+'/decidedAt').set(TS); toast('거절했어요. 사장이 다른 지원자를 뽑을 수 있어요.'); } });
}

/* 채용공고 목록 + 지원 */
function studentJobsCard(){
  const p = phase();
  if(p<1) return '';                                   // 채용공고·지원은 1일차(모집) 또는 2~3일차(추가 채용)
  const rehirePhase = (p>=2);                          // 2~3일차 = 추가 채용
  const locked = !!obj(DB.acceptedLock)[ME.cd];
  // 1일차 초기 채용은 이중취업 방지(취업하면 숨김). 추가채용(2~3일차)은 재직자도 겸직으로 지원 가능 → 계속 표시
  const biz = obj(DB.businesses);
  const approvedBiz = entries(biz).filter(([cd,b])=>b.status==='approved');
  if(!approvedBiz.length) return '';                   // 교사가 사업가를 승인해야 채용공고가 뜸
  let posts = entries(DB.jobPosts).filter(([bc,pt])=> pt.postedAt && obj(biz[bc]).status==='approved');
  if(rehirePhase) posts = posts.filter(([bc,pt])=> pt.rehire && pt.open);   // 2~3일차엔 추가 채용 중인 공고만
  let h = '<div class="card"><h2>📢 '+(rehirePhase?'추가 채용 공고':'채용 공고')+'</h2>';
  if(!posts.length){ h += '<div class="empty">'+(rehirePhase?'추가 채용 중인 회사가 없어요.':'아직 올라온 공고가 없어요.')+'</div></div>'; return h; }
  posts.forEach(([bc,pt])=>{
    const bz = obj(biz[bc]);
    const bname = bz.name || nmeOf(bc);
    const myResume = getResumeLocal(bc) || {};                   // 이력서 내용은 로컬 프리필(남의 이력서 안 받음)
    const applied = !!obj(obj(DB.applicantIndex)[ME.cd])[bc];    // 지원 여부는 역인덱스로 판정
    h += '<div class="job">';
    // 회사명 + 사장 이름 헤더
    h += '<div class="job-top"><div class="job-logo">🏪</div><div class="job-id">'
       + `<div class="job-name">${esc(bname)}</div>`
       + `<div class="job-boss">👤 사장 ${esc(nmeOf(bc))}</div></div>`
       + (pt.open!==false?'<span class="badge b-ok">모집중</span>':'<span class="badge b-no">마감</span>')
       + '</div>';

function submitResume(bc){

    career:$('r_career_'+bc).value.trim(), resolve:$('r_resolve_'+bc).value.trim(),

  };

  // 익명 지원: 이력서 내용에 본인 이름(성 포함/성 제외)이 들어가면 제출 차단
  const nm = (ME.nm||'').trim();
  const given = nm.length>=2 ? nm.slice(1) : '';   // 성 제외 이름(예: 박지혜→지혜)

/* ============================================================
   공용: Cloudinary 업로드 · 서명패드 · 인쇄(A4 세로)
============================================================ */
async function _cldUpload(dataUrl){
  const fd = new FormData(); fd.append('file', dataUrl); fd.append('upload_preset', CLD_PRESET);
  const res = await fetch('https://api.cloudinary.com/v1_1/'+CLD_CLOUD+'/image/upload', {method:'POST', body:fd});
  if(!res.ok) throw new Error('upload '+res.status);
  const j = await res.json(); return j.secure_url||'';
}
let _signCtx=null;
function openSignPad(title, onDone){
  let ov = $('signOverlay');
  if(!ov){ ov = document.createElement('div'); ov.id='signOverlay'; ov.className='pc-overlay'; document.body.appendChild(ov); }
  ov.innerHTML = '<div class="pc-box" style="max-width:440px"><h3>'+esc(title)+'</h3>'
    + '<p class="muted" style="margin:-4px 0 10px">아래 칸에 손가락(또는 마우스)으로 서명하세요.</p>'
    + '<canvas id="signCanvas" width="400" height="190" style="width:100%;border:1.5px dashed #cfd4da;border-radius:12px;background:#fff;touch-action:none;cursor:crosshair"></canvas>'
    + '<div class="pc-btns" style="margin-top:12px"><button class="btn-gray" onclick="_signClear()">지우기</button><button class="btn-gray" onclick="_signCancel()">취소</button><button class="btn-grn" id="signOkBtn">서명 완료</button></div></div>';
  ov.classList.add('show');
  const cv=$('signCanvas'), ctx=cv.getContext('2d');
  ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#16233d';
  let drawing=false,last=null,dirty=false;
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=(e.touches&&e.touches[0])||e; return {x:(t.clientX-r.left)*(cv.width/r.width), y:(t.clientY-r.top)*(cv.height/r.height)}; };
  const down=e=>{ e.preventDefault(); drawing=true; last=pos(e); try{ cv.setPointerCapture(e.pointerId); }catch(_){} };
  const move=e=>{ if(!drawing)return; e.preventDefault(); const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; dirty=true; };
  const up=()=>{ drawing=false; };
  if(window.PointerEvent){   // 포인터 이벤트(터치·펜·마우스 통합) — 최신 태블릿
    cv.addEventListener('pointerdown',down); cv.addEventListener('pointermove',move); cv.addEventListener('pointerup',up); window.addEventListener('pointerup',up);
  } else {                   // 폴백: 터치 + 마우스
    cv.addEventListener('touchstart',down,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',up);
    cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  }
  _signCtx={ov,up};
  const _cleanup=()=>{ window.removeEventListener('pointerup',up); window.removeEventListener('mouseup',up); };
  window._signClear=()=>{ ctx.clearRect(0,0,cv.width,cv.height); dirty=false; };
  window._signCancel=()=>{ ov.classList.remove('show'); _cleanup(); };
  $('signOkBtn').onclick=()=>{
    if(!dirty){ toast('서명을 그려주세요'); return; }
    const url=cv.toDataURL('image/png'); ov.classList.remove('show'); _cleanup(); onDone(url);
  };
}

/* 사장이 서명하는 순간 = 투자금(쿠키) 지급 시점.
   서명 저장 + 쿠키 지급(본인 이벤트 상점 shopUsed 음수 차감) + 선물 메시지를 원자적으로 처리. */
function signInvestment(cd){ captureSign('대표자(을) 서명', async url=>{
  if(window._invSending[cd]){ return; }
  window._invSending[cd] = true;
  try{
    // 🛡️ 지급액(paidCookie/cookie/rentFee)은 서버 최신값으로 재읽기 후 delta 계산.
    //    (다른 탭/기기에서 방금 재서명·금액변경됐을 때 로컬 스냅샷 기준이면 이중지급/과소지급 가능)
    let inv;
    try { const snap = await S.child('businesses/'+cd+'/investment').once('value'); inv = obj(snap.val()); }
    catch(_){ inv = obj(obj(obj(DB.businesses)[cd]).investment); }   // 재읽기 실패 시 로컬 폴백
    const bn = obj(obj(DB.businesses)[cd]).name || nmeOf(cd);
    const gross = inv.cookie||0, rentFee = inv.rentFee||0;
    const cookie = Math.max(0, gross - rentFee);   // 실지급 = 투자쿠키 − 대여료
    // 본인 상점 키를 캐시에서 해결(추가 읽기 0) — EventShop/stu 전체 재조회 방지
    const k = await _resolveShopKey(cd);
    if(k==null){ toast('내 상점 계정을 찾지 못했어요 — 선생님께 알려주세요'); return; }
    // 🛡️ 이중지급 방지(CAS): paidCookie를 트랜잭션으로 원자적으로 cookie에 확정하고,
    //    확정 '직전'의 실제 값(prevPaid)에서 delta를 계산 → 두 탭/기기가 같은 순간 서명해도 지급은 딱 1번.
    //    (기존엔 once()로 읽은 already 기준이라, 두 서명자가 동일 already(예:0)를 읽어 각자 increment → 이중지급 가능)
    let prevPaid = 0, casOk = false;
    try {
      const tx = await S.child('businesses/'+cd+'/investment/paidCookie').transaction(cur => {
        prevPaid = (typeof cur === 'number') ? cur : 0;
        return cookie;   // 항상 목표값으로 확정(멱등) — 두 번째 동시 서명은 prev=cookie가 되어 delta=0
      });
      casOk = tx.committed;
    } catch(_){ casOk = false; }
    if(!casOk){ toast('서명 처리 중이에요 — 잠시 후 다시 시도해 주세요'); return; }
    const delta = cookie - prevPaid;   // 재서명 시 이미 지급된 분(prevPaid)은 제외하고 차액만 이동
    // 서명 URL/시각 기록 + 쿠키 이동(shopUsed 음수 차감=잔액↑). paidCookie는 위 트랜잭션에서 이미 원자 확정됨.
    const updates = {};
    if(delta!==0){
      updates['EventShop/stu/'+k+'/shopUsed']  = firebase.database.ServerValue.increment(-delta);
      updates['EventShop/stu/'+k+'/updatedAt'] = Date.now();
    }
    const ip = 'Startup/businesses/'+cd+'/investment/';
    updates[ip+'bossSignUrl']=url; updates[ip+'signedAt']=firebase.database.ServerValue.TIMESTAMP;
    try {
      await ROOT.update(updates);
    } catch(e){
      // 쓰기 실패 시 paidCookie를 원복 → '미지급인데 지급표시로 남는' 과소지급 상태 방지(커밋-후-보상)
      try { await S.child('businesses/'+cd+'/investment/paidCookie').set(prevPaid); } catch(_){}
      throw e;
    }
    if(delta>0) await _shopGiftMsg(cd, `📈 투자약정 체결! 「${bn}」 투자금 🍪${delta}쿠키가 지급됐어요. 사업 번창을 응원할게요! 🎉`, [{name:'쿠키', emoji:'🍪'}]);
    const rentNote = rentFee>0 ? `<br><span class="muted">투자쿠키 ${esc(gross)}에서 대여료 ${esc(rentFee)}쿠키를 뺀 금액이에요.</span>` : '';
    prettyConfirm('투자약정 체결 완료 🤝', `<b>${esc(bn)}</b> 투자약정서에 서명했어요!`+(cookie>0?`<br><b style="color:#c9520a;font-size:19px">🍪 ${esc(cookie)}쿠키</b>가 내 <b>이벤트 상점</b> 계좌로 지급됐어요.${rentNote}<br><span class="muted">이벤트 상점을 열어 확인해 보세요!</span>`:(rentFee>0?`<br><span class="muted">대여료 ${esc(rentFee)}쿠키 차감으로 실지급이 0이에요.</span>`:'<br><span class="muted">선생님께 서명을 보냈어요.</span>')), null, '🎉');
  }catch(e){ console.error(e); toast('서명·지급 실패 — 다시 시도해 주세요'); }
  finally{ window._invSending[cd] = false; }
}); }

  if(!inv.sentAt){ toast('보낸 투자약정서가 없어요'); return; }

  const bn = obj(obj(DB.businesses)[cd]).name || nmeOf(cd);
  prettyConfirm('투자약정서 취소', '<b>'+esc(bn)+'</b>의 투자약정서를 취소할까요?'+(back>0?'<br><span class="muted">지급했던 <b>'+back+'쿠키</b>를 회수하고 약정서를 삭제해요.</span>':'<br><span class="muted">약정서를 삭제해요.</span>'), async ()=>{

    window._invSending[cd] = true;
    try{
      // 쿠키 회수(양수=차감) + 약정서 삭제를 하나의 원자적 ROOT.update로
      const { updates, missing } = await _cookieUpdates(back>0 ? { [cd]: back } : {});
      if(missing.length){ toast('사장의 상점 계정을 찾지 못했어요'); return; }

    }catch(e){ console.error(e); toast('취소 실패 — 다시 시도해 주세요'); }
    finally{ window._invSending[cd] = false; }
  }, '🗑️');
}

/* 사장에게 이벤트 상점 '선생님 선물' 메시지 push → 학생 이벤트 상점에서 선물상자 팝업으로 표시.
   (이벤트 상점 교사 지급의 tchrMsg 구조 {msg, items:[{name,emoji}], ts} 를 그대로 사용) */
async function _shopGiftMsg(cd, msg, items){
  try{
    const k = await _resolveShopKey(cd); if(k==null) return false;
    const entry = { msg: msg, items: items||[], ts: Date.now() };
    const base = ROOT.child('EventShop/stu/'+k);
    await base.child('tchrMsg').transaction(cur=>{ const arr = Array.isArray(cur)?cur.slice():[]; arr.push(entry); return arr; });
    // 메시지 기록/회수용 teacherMsgs 에도 남김(선물상자가 이미 뜨므로 read:true 로 중복 팝업 방지)
    await base.child('teacherMsgs').transaction(cur=>{ const arr = Array.isArray(cur)?cur.slice():[]; arr.push({ text: msg, ts: entry.ts, read: true, items: items||[] }); return arr; });
    return true;
  }catch(e){ console.warn('shopGiftMsg', e); return false; }
}
/* 투자약정서 보내기(교사): 약정 내용만 기록·전송. 쿠키 지급은 사장이 서명할 때 이뤄짐(signInvestment). */
function sendInvestment(cd){
  if(window._invSending[cd]){ return; }
  const won=parseInt($('inv_won_'+cd).value)||0, cookie=parseInt($('inv_ck_'+cd).value)||0, pct=parseInt($('inv_pct_'+cd).value)||0;
  const rentFee=parseInt(($('inv_rent_'+cd)||{}).value)||0;
  sendInvestmentVals(cd, won, cookie, pct, rentFee);
}
// 값을 직접 받아 전송/수정(회사현황 에디터·일괄표 인라인 편집 공용). 미전송은 확인창, 서명완료는 '알림 없이' 즉시 정산.
function sendInvestmentVals(cd, won, cookie, pct, rentFee){
  if(window._invSending[cd]){ return; }
  rentFee = Math.max(0, rentFee||0);
  const inv = obj(obj(obj(DB.businesses)[cd]).investment);
  const bn = obj(obj(DB.businesses)[cd]).name || nmeOf(cd);
  if(inv.bossSignUrl){ _doSendInvestment(cd, won, cookie, pct, rentFee); return; }
  const net = Math.max(0, cookie - rentFee);
  const rentLine = rentFee>0 ? `<br><span class="muted">대여료 ${rentFee}쿠키 차감 → 실지급 <b>${net}쿠키</b></span>` : '';
  const msgHtml = `<b>${esc(bn)}</b> 사장에게 투자약정서를 보낼까요?<br><b style="color:#c9520a;font-size:18px">🍪 ${cookie}쿠키</b> 는 <b>사장이 서명하면</b> 이벤트 상점으로 지급돼요.${rentLine}`;
  prettyConfirm(inv.sentAt?'투자약정서 수정':'투자약정서 보내기', msgHtml, ()=>_doSendInvestment(cd, won, cookie, pct, rentFee), '📨');
}
async function _doSendInvestment(cd, won, cookie, pct, rentFee){
  if(window._invSending[cd]){ return; }
  window._invSending[cd] = true;
  rentFee = Math.max(0, rentFee||0);
  try{
    const inv = obj(obj(obj(DB.businesses)[cd]).investment);
    const ip = 'businesses/'+cd+'/investment/';
    if(inv.bossSignUrl){
      // 이미 서명된 약정 수정: 서명 유지 + 쿠키 차액을 교사가 즉시 정산(추가지급/회수)하고 paidCookie 갱신.
      // 실지급(net) = 투자쿠키 − 대여료 기준으로 정산 → 대여료를 바꿔도 자동 재정산.
      const paid = inv.paidCookie||0;
      const net = Math.max(0, cookie - rentFee);
      const shopDelta = paid - net;   // 음수=추가지급(잔액↑), 양수=회수(잔액↓)
      const { updates, missing } = await _cookieUpdates(shopDelta!==0 ? { [cd]: shopDelta } : {});
      if(missing.length){ toast('사장의 상점 계정을 찾지 못했어요'); return; }
      updates['Startup/'+ip+'won']=won; updates['Startup/'+ip+'cookie']=cookie;
      updates['Startup/'+ip+'pct']=pct; updates['Startup/'+ip+'rentFee']=rentFee; updates['Startup/'+ip+'sentAt']=TS;
      updates['Startup/'+ip+'paidCookie']=net;
      await ROOT.update(updates);
      toast(shopDelta!==0 ? '수정했어요 — 쿠키 차액을 정산했어요' : '수정했어요 (서명 유지)');
    } else {
      const upd = { [ip+'won']:won, [ip+'cookie']:cookie, [ip+'pct']:pct, [ip+'rentFee']:rentFee, [ip+'sentAt']:TS };
      await S.update(upd);
      toast('투자약정서를 보냈어요 📨 (서명 시 지급)');
    }
  }catch(e){ console.error(e); toast('전송 실패 — 다시 시도해 주세요'); }
  finally{ window._invSending[cd] = false; }
}

/* ============================================================
   월급 정산 (교사) — 사장의 지급 요청을 승인하면 직원 지급·사장 차감
============================================================ */
function teacherPayrollCard(){

  const pend = [];
  entries(pr).forEach(([bcd, reqs])=> entries(reqs).forEach(([id,r])=>{ if(r && r.status==='pending') pend.push({bcd,id,r}); }));
  pend.sort((a,b)=>(a.r.requestedAt||0)-(b.r.requestedAt||0));
  let h = '<div class="card"><h2>💰 시급 정산 요청 <span class="badge b-wait">'+pend.length+'</span></h2>';
  if(!pend.length){ h += '<div class="empty">대기 중인 시급 정산 요청이 없습니다.</div>'; }
  pend.forEach(({bcd,id,r})=>{
    const bn = obj(obj(DB.businesses)[bcd]).name || nmeOf(bcd);
    h += '<div class="list-item">';
    h += `<div class="biz-head"><b>${esc(bn)}</b><span class="muted">사장 ${esc(nmeOf(bcd))}</span></div>`;
    h += '<div class="kv">'+(r.items||[]).map(it=>'🙋 '+esc(nmeOf(it.cd))+' — <b>'+esc(it.pay)+'</b>쿠키').join('<br>')+'</div>';
    h += `<div class="row" style="justify-content:space-between;align-items:center;margin-top:6px"><span>총 <b>${esc(r.total||0)}</b>쿠키 지급 · 사장 <b>${esc(r.total||0)}</b>쿠키 차감</span><span><button class="btn-grn btn-sm" onclick="approvePayroll('${esc(bcd)}','${esc(id)}')">✅ 승인·지급</button> <button class="btn-gray btn-sm" onclick="rejectPayroll('${esc(bcd)}','${esc(id)}')">거절</button></span></div>`;
    h += '</div>';
  });
  h += '</div>';
  return h;
}
function approvePayroll(bcd, id){
  const r = obj(obj(obj(DB.payroll)[bcd])[id]);
  if(!r || r.status!=='pending'){ toast('이미 처리된 요청이에요'); return; }
  const total = r.total||0;
  const bn = obj(obj(DB.businesses)[bcd]).name || nmeOf(bcd);
  prettyConfirm('시급 지급 승인', '<b>'+esc(bn)+'</b>의 시급 <b>총 '+total+'쿠키</b>를 지급할까요?<br><span class="muted">직원 통장에 쿠키가 들어가고, 사장 쿠키에서 '+total+'쿠키가 빠져나가요.</span>', async ()=>{
    // 멱등 선점: pending → paying (이중 승인/이중 지급 방지)
    let res;
    try{ res = await S.child('payroll/'+bcd+'/'+id+'/status').transaction(cur=> cur==='pending' ? 'paying' : undefined); }
    catch(e){ toast('처리 실패'); return; }
    if(!res.committed){ toast('이미 처리 중이거나 완료된 요청이에요'); return; }
    // 🎟️ 사장 부담분은 상점이용권부터 소모(쿠키 1:1), 나머지는 쿠키. 승인 시점 잔액으로 재검증.
    const info = await _bossShopInfo(bcd);
    if(!info){
      await S.child('payroll/'+bcd+'/'+id+'/status').set('pending');
      prettyAlert('지급할 수 없어요', '이벤트 상점에서 <b>사장님 계정</b>을 찾지 못했어요.', '⚠️');
      return;
    }
    // 직원 지급분(잔액↑) 먼저 구성 → 상점 미등록(계정 없는) 직원을 파악
    const empDelta = {};
    (r.items||[]).forEach(it=>{ empDelta[it.cd] = (empDelta[it.cd]||0) - (it.pay||0); });
    const empRes = await _cookieUpdates(empDelta);   // 지급 가능한 직원분 updates + 미등록 목록(missing)
    const missSet = new Set(empRes.missing);
    const missingPay = (r.items||[]).reduce((s,it)=> s + (missSet.has(String(it.cd).trim()) ? (it.pay||0) : 0), 0);
    const effTotal = Math.max(0, total - missingPay);   // 실제 지급된 직원분만 사장이 부담(미등록분 과다차감 방지)
    if(info.avail + info.voucherCount < effTotal){
      await S.child('payroll/'+bcd+'/'+id+'/status').set('pending');   // 선점 해제 → 나중에 다시 승인 가능
      prettyAlert('지급할 수 없어요', '사장님의 <b>쿠키+상점이용권</b>이 부족해요.<br>필요 <b>'+effTotal+'개</b> · 보유 쿠키 <b>'+info.avail+'🍪</b> + 이용권 <b>'+info.voucherCount+'장</b>.<br>사장님이 쿠키를 마련한 뒤 다시 승인해 주세요.', '🍪');
      return;
    }
    const voucherUse = Math.min(info.voucherCount, effTotal);
    const cookieDeduct = effTotal - voucherUse;
    try{
      // 쿠키 이동 + 이용권 소모 + 상태(paid)를 하나의 원자적 ROOT.update로 → 부분 실패 시 이중지급 방지
      const updates = Object.assign({}, empRes.updates);   // 지급 가능한 직원분만 반영(미등록 직원 제외)
      if(cookieDeduct>0) updates['EventShop/stu/'+info.key+'/shopUsed'] = firebase.database.ServerValue.increment(cookieDeduct);   // 사장 쿠키 차감(이용권 제외분)
      for(let i=0;i<voucherUse;i++){ updates['EventShop/stu/'+info.key+'/inv/'+info.voucherIdx[i]+'/st'] = 'used'; }   // 이용권부터 소모
      if(cookieDeduct>0 || voucherUse>0) updates['EventShop/stu/'+info.key+'/updatedAt'] = Date.now();
      updates['Startup/payroll/'+bcd+'/'+id+'/status'] = 'paid';
      updates['Startup/payroll/'+bcd+'/'+id+'/paidAt']  = firebase.database.ServerValue.TIMESTAMP;
      updates['Startup/payroll/'+bcd+'/'+id+'/voucherUsed'] = voucherUse;
      updates['Startup/payroll/'+bcd+'/'+id+'/cookiePaid']  = cookieDeduct;
      updates['Startup/payroll/'+bcd+'/'+id+'/paidTotal']   = effTotal;
      await ROOT.update(updates);
      const missN = empRes.missing.length;
      toast(missN ? ('지급 완료 · 미등록 '+missN+'명 제외(사장 '+effTotal+' 차감)') : ('시급 '+effTotal+' 지급 완료! 💸'+(voucherUse?(' · 이용권 '+voucherUse+'장 사용'):'')));
    }catch(e){
      console.error(e);
      S.child('payroll/'+bcd+'/'+id+'/status').set('pending');   // 원자 실패=아무것도 안 바뀜 → 안전하게 pending 복구
      toast('지급 실패 — 다시 시도해 주세요');
    }
  }, '💰');
}

    const duty    = (c.duty!=null)     ? c.duty     : (post.duty||biz.duty||'');
    const hours   = (c.workHours!=null)? c.workHours: (post.workDays||biz.workDays||'');
    const base    = (c.hourly!=null)   ? c.hourly   : ((obj(obj(DB.hires)[cd])[acd].weeklyPay) || post.weeklyPay || 0);
    const wBonus  = (c.bonus!=null)    ? c.bonus    : (biz.bonus||'없음');       // 계약 우선, 없으면 사업계획서
    const wIns4   = (c.ins4!=null)     ? c.ins4     : (biz.ins4||'없음');
    const wCond   = (c.condition!=null)? c.condition: (biz.condition||'');
    const signed = !!c.ownerSignUrl;   // 사장 서명(제출) 완료 → 잠금
    // 계약서 문서 형태(투자약정서와 동일). 서명 전엔 편집칸, 서명 후엔 잠금(클릭 시 안내)
    h += '<div class="list-item" style="padding:0;border:0"><div style="border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff;font-size:14px;line-height:1.9"'+(signed?' onclick="_contractLocked()"':'')+'>';
    h += `<div style="text-align:center;font-weight:800;font-size:16px;margin-bottom:8px">(${esc(nmeOf(acd))}) 근로 계약서</div>`;
    h += `사업주 <b>${esc(nmeOf(cd))}</b>(갑)과 근로자 <b>${esc(nmeOf(acd))}</b>(을)은 다음과 같이 근로계약을 체결한다.`;
    if(signed){
      h += `<div style="margin-top:8px"><b>담당 업무</b> ${esc(c.duty||'-')}</div>`;
      h += `<div style="margin-top:6px"><b>근무 시간</b> ${esc(c.workHours||'-')}</div>`;
      h += `<div style="margin-top:6px"><b>시급 (쿠키)</b> ${esc(c.hourly||0)} 쿠키</div>`;
    } else {
      h += `<div style="margin-top:8px"><b>담당 업무</b> <input id="ct_duty_${acd}" value="${esc(duty)}" style="${_inp};min-width:220px"></div>`;
      h += `<div style="margin-top:6px"><b>근무 시간</b> <input id="ct_hours_${acd}" value="${esc(hours)}" style="${_inp};min-width:160px"></div>`;
      h += `<div style="margin-top:6px"><b>시급 (쿠키)</b> <input id="ct_pay_${acd}" type="number" min="0" value="${esc(base)}" style="${_inp};width:100px"> 쿠키</div>`;
    }
    if(signed){
      h += `<div style="margin-top:6px"><b>성과급</b> ${wBonus==='있음'?'있음':'없음'}</div>`;
      h += `<div style="margin-top:6px"><b>4대 보험</b> ${wIns4==='있음'?'있음':'없음'}</div>`;
      h += `<div style="margin-top:6px"><b>기타</b> ${esc(wCond||'-')}</div>`;
    } else {
      h += `<div style="margin-top:6px"><b>성과급</b> <select id="ct_bonus_${acd}" style="${_inp}">${_optSel(['없음','있음'], wBonus==='있음'?'있음':'없음')}</select></div>`;
      h += `<div style="margin-top:6px"><b>4대 보험</b> <select id="ct_ins4_${acd}" style="${_inp}">${_optSel(['없음','있음'], wIns4==='있음'?'있음':'없음')}</select></div>`;
      h += `<div style="margin-top:6px"><b>기타</b> <input id="ct_cond_${acd}" value="${esc(wCond)}" style="${_inp};min-width:200px"></div>`;
    }
    h += CONTRACT_CLAUSES;
    h += '<div style="display:flex;justify-content:space-around;margin-top:16px;text-align:center">';
    h += `<div>사업주(갑): ${esc(nmeOf(cd))}${_sImg(c.ownerSignUrl)}</div>`;
    h += `<div>근로자(을): ${esc(nmeOf(acd))}${_sImg(c.workerSignUrl)}</div>`;
    h += '</div></div>';
    if(!signed){
      h += `<div class="row" style="margin-top:8px"><button class="btn-grn btn-sm" onclick="signContract('owner','${cd}','${acd}')">✍ 사장 서명 (제출)</button></div>`;
    } else if(c.workerSignUrl){
      h += '<div class="badge b-ok" style="margin-top:8px">계약 체결 완료! 🤝</div>';
    } else {
      h += '<div class="muted" style="margin-top:8px">✅ 제출 완료 · 근로자 서명을 기다리는 중이에요.</div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}
function saveContract(acd){
  const bc = ME.cd;
  const pay = parseInt($('ct_pay_'+acd).value)||0;
  S.child('contracts/'+_ck(bc,acd)).update({ employerCd:bc,
    duty:$('ct_duty_'+acd).value.trim(), workHours:$('ct_hours_'+acd).value.trim(), hourly:pay,
    bonus:$('ct_bonus_'+acd).value, ins4:$('ct_ins4_'+acd).value, condition:$('ct_cond_'+acd).value.trim(), updatedAt:TS });
  S.child('hires/'+bc+'/'+acd+'/weeklyPay').set(pay);   // 최종 시급을 정산에 반영
  toast('근로계약서를 저장했어요');
}
// 근로계약서 표준 조항(화면용) — 사장·직원 계약서 하단에 공통 첨부
const CONTRACT_CLAUSES = '<div style="margin-top:12px;border-top:1px dashed var(--line);padding-top:8px"><b>근로계약서 교부</b><br>사업주는 근로계약을 체결함과 동시에 본 계약서를 사본하여 근로자의 교부요구와 관계없이 근로자에게 교부함(근로기준법 제17조 이행).</div>'
  + '<div style="margin-top:8px"><b>근로계약·취업규칙 등의 성실한 이행의무</b><br>사업주와 근로자는 각자가 근로계약, 취업규칙, 단체협약을 지키고 성실하게 이행하여야 함.</div>'
  + '<div style="margin-top:8px"><b>기타</b><br>이 계약에 정함이 없는 사항은 근로기준법령에 의함.</div>';
function _contractLocked(){ prettyConfirm('수정할 수 없어요', '이미 <b>서명·제출</b>한 근로계약서는 수정할 수 없어요.', null, '🔒'); }
function signContract(role, bc, acd){
  const label = role==='owner'?'사장 서명':'근로자 서명';
  // ⚠️ 입력값은 서명패드를 열기 전에(클릭 시점) 미리 읽어둔다.
  // 서명하는 몇 초 동안 구독 업데이트로 카드가 재렌더되면 입력칸이 DB값으로 초기화되어 빈 내용이 저장될 수 있음.
  let fields = null;
  if(role==='owner'){
    const _v = id => { const el=$(id); return el? el.value.trim() : undefined; };
    const _p = $('ct_pay_'+acd);
    const _bo=$('ct_bonus_'+acd), _in=$('ct_ins4_'+acd);
    fields = { duty:_v('ct_duty_'+acd), workHours:_v('ct_hours_'+acd), hourly:_p?(parseInt(_p.value)||0):undefined,
      bonus:_bo?_bo.value:undefined, ins4:_in?_in.value:undefined, condition:_v('ct_cond_'+acd) };
  }
  const doSign = ()=> captureSign(label, url=>{
    const key = role==='owner'?'ownerSignUrl':'workerSignUrl';
    const upd = { employerCd:bc };   // 키가 bc_acd로 분리되어 employerCd는 항상 bc
    upd[key]=url; upd[role==='owner'?'ownerSignedAt':'workerSignedAt']=TS;
    // 사장이 저장을 누르지 않고 서명해도 (클릭 시점에 읽어둔) 편집 내용이 함께 저장됨
    if(role==='owner' && fields){
      if(fields.duty!==undefined) upd.duty=fields.duty;
      if(fields.workHours!==undefined) upd.workHours=fields.workHours;
      if(fields.bonus!==undefined) upd.bonus=fields.bonus;
      if(fields.ins4!==undefined) upd.ins4=fields.ins4;
      if(fields.condition!==undefined) upd.condition=fields.condition;
      if(fields.hourly!==undefined){ upd.hourly=fields.hourly; S.child('hires/'+ME.cd+'/'+acd+'/weeklyPay').set(fields.hourly); }
    }
    S.child('contracts/'+_ck(bc,acd)).update(upd).then(()=>toast('서명 완료! 🤝'));
  });
  // 사장 서명은 제출=잠금이므로 한 번 더 확인
  if(role==='owner') prettyConfirm('사장 서명 · 제출', '서명해서 제출하면 <b style="color:#c0392b">계약 내용을 더 이상 수정할 수 없어요.</b><br>지금 내용 그대로 서명할까요?', doSign, '✍');
  else doSign();
}
// 아르바이트(학생): 내 근로계약서 확인 + 서명 (2일차)
function studentContractCard(){
  if(phase()<2) return '';
  // 겸직: 내가 근로자인 모든 사장 계약(contracts/<사장>_<나>)을 표시
  const mine = Object.entries(obj(DB.contracts))
    .filter(([k,c])=> c && c.employerCd && k===_ck(c.employerCd, ME.cd))
    .sort((a,b)=>(a[1].updatedAt||0)-(b[1].updatedAt||0));
  if(!mine.length) return '';
  const sImg = u=> u? '<img src="'+esc(u)+'" style="height:44px;display:block;margin:4px auto">' : '<span class="muted" style="font-size:12px">(미서명)</span>';
  let out = '';
  mine.forEach(([k,c])=>{
    const bc = c.employerCd;
    const biz = obj(obj(DB.businesses)[bc]);
    let h = '<div class="card nograb" oncontextmenu="return false" ondragstart="return false"><h2>📝 근로계약서'+(mine.length>1?' — '+esc(biz.name||nmeOf(bc)):'')+'</h2>';
    h += '<div style="border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff;font-size:14px;line-height:1.85">';
    h += `<div style="text-align:center;font-weight:800;font-size:16px;margin-bottom:8px">(${esc(nmeOf(ME.cd))}) 근로 계약서</div>`;
    h += `사업주 <b>${esc(nmeOf(bc))}</b>(갑)과 근로자 <b>${esc(nmeOf(ME.cd))}</b>(을)은 다음과 같이 근로계약을 체결한다.`;
    h += `<div style="margin-top:8px"><b>담당 업무</b> ${esc(c.duty||'-')}</div>`;
    h += `<div style="margin-top:6px"><b>근무 시간</b> ${esc(c.workHours||'-')}</div>`;
    h += `<div style="margin-top:6px"><b>시급 (쿠키)</b> ${esc(c.hourly||0)} 쿠키</div>`;
    h += `<div style="margin-top:6px"><b>성과급</b> ${(c.bonus!=null?c.bonus:biz.bonus)==='있음'?'있음':'없음'}</div>`;
    h += `<div style="margin-top:6px"><b>4대 보험</b> ${(c.ins4!=null?c.ins4:biz.ins4)==='있음'?'있음':'없음'}</div>`;
    h += `<div style="margin-top:6px"><b>기타</b> ${esc((c.condition!=null?c.condition:biz.condition)||'-')}</div>`;
    h += CONTRACT_CLAUSES;
    h += '<div style="display:flex;justify-content:space-around;margin-top:16px;text-align:center">';
    h += `<div>사업주(갑): ${esc(nmeOf(bc))}${sImg(c.ownerSignUrl)}</div>`;
    h += `<div>근로자(을): ${esc(nmeOf(ME.cd))}${sImg(c.workerSignUrl)}</div>`;
    h += '</div></div>';
    if(c.ownerSignUrl){
      if(c.workerSignUrl) h += '<div class="badge b-ok" style="margin-top:8px">계약 체결 완료! 🤝</div>';
      else h += `<div class="row" style="margin-top:8px"><button class="btn-grn btn-sm" onclick="signContract('worker','${bc}','${ME.cd}')">✍ 계약서에 서명하기</button></div>`;
    } else {
      h += '<div class="muted" style="margin-top:8px">사장 서명을 기다리는 중이에요.</div>';
    }
    h += '</div>';
    out += h;
  });
  return out;
}
